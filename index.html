<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone (Firebase + ImgBB)</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Авторизация */
        .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; }

        /* Контейнер чата */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Пузыри сообщений */
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 8px; position: relative; font-size: 14px; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.received { align-self: flex-start; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg img { width: 100%; border-radius: 5px; margin-top: 5px; }
        .msg .time { font-size: 10px; color: #999; display: block; text-align: right; margin-top: 4px; }

        /* Панель ввода */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input[type="text"], input[type="email"] { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; }
        .btn-send { background: #128c7e; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        #auth-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>WhatsApp Web Clone</h2>
    <button id="loginBtn" style="padding: 15px 30px; background: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Войти через Google</button>
</div>

<div class="header">
    <div class="user-info">
        <img id="myPhoto" src="" alt="">
        <span id="myName">Чат</span>
    </div>
    <button id="logoutBtn" style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px;">Выйти</button>
</div>

<div style="background: #eee; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #ddd;">
    <input type="email" id="receiverEmail" placeholder="Email получателя (кого нет в чате?)">
    <button onclick="startChat()" style="background:#075e54; color:white; border:none; padding:0 15px; border-radius:5px;">Найти</button>
</div>

<div id="chat-container">
    </div>

<div class="input-area" id="input-zone" style="display: none;">
    <input type="file" id="fileInput" accept="image/*" style="width: 40px; overflow: hidden;">
    <input type="text" id="msgInput" placeholder="Введите сообщение">
    <button class="btn-send" id="sendBtn">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const imgbbKey = "f7dc2e47cafbeb566657f257117c4ef0";

    let currentChatId = null;
    let unsubscribe = null;

    // Авторизация
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('myPhoto').src = user.photoURL;
            document.getElementById('myName').innerText = user.displayName;
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    // Функция создания ID чата
    window.startChat = () => {
        const receiver = document.getElementById('receiverEmail').value.trim();
        if (!receiver) return alert("Введите Email!");
        const myEmail = auth.currentUser.email;
        
        // Сортируем емейлы, чтобы ID был одинаковым для обоих участников
        currentChatId = [myEmail, receiver].sort().join("_").replace(/\./g, ",");
        
        document.getElementById('input-zone').style.display = 'flex';
        loadMessages(currentChatId);
    };

    // Загрузка сообщений
    function loadMessages(chatId) {
        if (unsubscribe) unsubscribe(); // Отписываемся от старого чата
        
        const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
        unsubscribe = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const type = d.sender === auth.currentUser.email ? 'sent' : 'received';
                const img = d.image ? `<img src="${d.image}">` : "";
                
                container.innerHTML += `
                    <div class="msg ${type}">
                        ${d.text}
                        ${img}
                        <span class="time">${d.timestamp?.toDate().toLocaleTimeString() || "..."}</span>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    // Отправка
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        const file = document.getElementById('fileInput').files[0];
        if (!text && !file) return;

        let imageUrl = null;
        document.getElementById('sendBtn').disabled = true;

        try {
            if (file) {
                const fd = new FormData();
                fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: fd });
                const json = await res.json();
                imageUrl = json.data.url;
            }

            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                sender: auth.currentUser.email,
                text: text,
                image: imageUrl,
                timestamp: serverTimestamp()
            });

            document.getElementById('msgInput').value = "";
            document.getElementById('fileInput').value = "";
        } catch (e) {
            alert("Ошибка: " + e.message);
        } finally {
            document.getElementById('sendBtn').disabled = false;
        }
    };
</script>
</body>
</html>
