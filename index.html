<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Firebase Firestore Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1, h2 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      max-width: 500px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background-color: #3498db;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #2980b9;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
    li {
      background: #ecf0f1;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
    }
    .rules {
      font-size: 14px;
      color: #7f8c8d;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Firebase Firestore Demo</h1>

  <div class="container">
    <h2>Добавить пользователя</h2>
    <p class="rules">Введите имя (не менее 2 символов) и корректный email.</p>
    <input type="text" id="name" placeholder="Имя">
    <input type="email" id="email" placeholder="Email">
    <button id="addUserBtn">Добавить</button>
  </div>

  <div class="container">
    <h2>Список пользователей</h2>
    <button id="getUsersBtn">Показать пользователей</button>
    <ul id="userList"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
      authDomain: "database-375f4.firebaseapp.com",
      projectId: "database-375f4",
      storageBucket: "database-375f4.firebasestorage.app",
      messagingSenderId: "155181454067",
      appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
      measurementId: "G-TB3G4KSQ8S"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // Функция добавления пользователя с проверкой
    async function addUser(name, email) {
      if (name.length < 2) {
        alert("Имя должно быть не менее 2 символов!");
        return;
      }
      if (!email.includes("@")) {
        alert("Введите корректный email!");
        return;
      }
      try {
        const docRef = await addDoc(collection(db, "users"), {
          name: name,
          email: email,
          createdAt: new Date()
        });
        alert("Пользователь добавлен с ID: " + docRef.id);
      } catch (e) {
        console.error("Ошибка при добавлении пользователя: ", e);
      }
    }

    // Функция получения всех пользователей
    async function getUsers() {
      try {
        const querySnapshot = await getDocs(collection(db, "users"));
        const users = [];
        querySnapshot.forEach((doc) => {
          users.push({ id: doc.id, ...doc.data() });
        });

        const userList = document.getElementById("userList");
        userList.innerHTML = "";
        users.forEach(user => {
          const li = document.createElement("li");
          li.textContent = `ID: ${user.id}, Name: ${user.name}, Email: ${user.email}`;
          userList.appendChild(li);
        });
      } catch (e) {
        console.error("Ошибка при получении пользователей: ", e);
      }
    }

    document.getElementById("addUserBtn").addEventListener("click", () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      addUser(name, email);
    });

    document.getElementById("getUsersBtn").addEventListener("click", getUsers);
  </script>
</body>
</html>
