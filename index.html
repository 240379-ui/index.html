<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>DM Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 20px auto;
    }
    #chat {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: scroll;
      padding: 10px;
      margin-top: 10px;
    }
    input {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }
    button {
      padding: 10px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>💬 DM Chat</h2>

<button id="login">Войти через Google</button>
<p id="user"></p>

<hr>

<input id="toEmail" placeholder="Email получателя">
<input id="message" placeholder="Сообщение">
<button id="send">Отправить</button>

<div id="chat"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 ТВОЙ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
  authDomain: "database-375f4.firebaseapp.com",
  projectId: "database-375f4",
  storageBucket: "database-375f4.firebasestorage.app",
  messagingSenderId: "155181454067",
  appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
  measurementId: "G-TB3G4KSQ8S"
};

// 🚀 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 LOGIN
const provider = new GoogleAuthProvider();

document.getElementById("login").onclick = async () => {
  await signInWithPopup(auth, provider);
};

// 👤 USER STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("user").innerText = "Ты: " + user.email;
    loadMessages(user);
  }
});

// 📤 SEND MESSAGE
document.getElementById("send").onclick = async () => {
  const user = auth.currentUser;

  if (!user) {
    alert("Сначала войди!");
    return;
  }

  const toEmail = document.getElementById("toEmail").value;
  const message = document.getElementById("message").value;

  if (!toEmail || !message) {
    alert("Заполни все поля!");
    return;
  }

  await addDoc(collection(db, "messages"), {
    from: user.email,
    to: toEmail,
    text: message,
    createdAt: Date.now()
  });

  document.getElementById("message").value = "";
};

// 📥 LOAD MESSAGES
function loadMessages(user) {
  const q = query(
    collection(db, "messages"),
    where("to", "==", user.email),
    orderBy("createdAt", "asc")
  );

  onSnapshot(q, (snapshot) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();
      chat.innerHTML += `
        <p><b>${msg.from}:</b> ${msg.text}</p>
      `;
    });

    chat.scrollTop = chat.scrollHeight;
  });
}
</script>

</body>
</html>
