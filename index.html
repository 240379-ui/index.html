<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сессия</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 420px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .timer {
      text-align: center;
      font-size: 32px;
      color: #2563eb;
      font-weight: bold;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .google-btn {
      width: 100%;
      background: #2563eb;
      color: white;
      margin-bottom: 15px;
    }

    .danger {
      width: 100%;
      background: #ef4444;
      color: white;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .warning {
      flex: 1;
      background: #facc15;
    }

    .gray {
      flex: 1;
      background: #9ca3af;
      color: white;
    }

    .chat-box {
      height: 250px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      overflow-y: auto;
      margin-bottom: 15px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
    }

    .send-btn {
      width: 60px;
      background: #22c55e;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="card">
    <h2 id="username">Авторизация</h2>

    <button class="google-btn" onclick="signInWithGoogle()">
      Войти через Google
    </button>

    <div class="timer" id="timer">23 сек.</div>

    <button class="danger">Завершить сессию</button>

    <div class="row">
      <button class="warning">Перерыв</button>
      <button class="gray" onclick="logout()">Выход</button>
    </div>
  </div>

  <div class="card">
    <h2>Общий чат</h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-row">
      <input type="text" id="messageInput" placeholder="Сообщение..." />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  const supabaseUrl = "https://yhlulkexiyalevwcuqka.supabase.co";
  const supabaseKey = "sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  let currentUser = null;

  async function signInWithGoogle() {
    await supabase.auth.signInWithOAuth({
      provider: 'google'
    });
  }

  async function checkUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
      currentUser = data.user;
      document.getElementById("username").innerText =
        data.user.user_metadata.full_name || data.user.email;
    }
  }

  async function logout() {
    await supabase.auth.signOut();
    location.reload();
  }

  async function loadMessages() {
    const { data } = await supabase
      .from("messages")
      .select("*")
      .order("created_at", { ascending: true });

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    if (data) {
      data.forEach(msg => {
        chatBox.innerHTML += `
          <div class="message">
            <b>${msg.username}:</b> ${msg.text}
          </div>
        `;
      });
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value;

    if (!text || !currentUser) return;

    await supabase.from("messages").insert([
      {
        username: currentUser.user_metadata.full_name || currentUser.email,
        text: text
      }
    ]);

    input.value = "";
    loadMessages();
  }

  let sec = 23;
  setInterval(() => {
    if (sec > 0) sec--;
    document.getElementById("timer").innerText = sec + " сек.";
  }, 1000);

  checkUser();
  loadMessages();
</script>

</body>
</html>
