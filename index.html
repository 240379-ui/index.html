<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мессенджер на Firebase</title>
  <script type="module">
    // Импорт Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Конфигурация Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
      authDomain: "database-375f4.firebaseapp.com",
      projectId: "database-375f4",
      storageBucket: "database-375f4.firebasestorage.app",
      messagingSenderId: "155181454067",
      appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
      measurementId: "G-TB3G4KSQ8S"
    };

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    // Элементы DOM
    const loginBtn = document.getElementById("login");
    const logoutBtn = document.getElementById("logout");
    const chatBox = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("message");

    // Авторизация
    loginBtn.onclick = () => signInWithPopup(auth, provider);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, user => {
      if (user) {
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        form.style.display = "flex";
        loadMessages();
      } else {
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        form.style.display = "none";
        chatBox.innerHTML = "";
      }
    });

    // Отправка сообщения
    form.onsubmit = async (e) => {
      e.preventDefault();
      if (input.value.trim() === "") return;
      await addDoc(collection(db, "messages"), {
        text: input.value,
        uid: auth.currentUser.uid,
        displayName: auth.currentUser.displayName,
        createdAt: serverTimestamp()
      });
      input.value = "";
    };

    // Загрузка сообщений
    function loadMessages() {
      const q = query(collection(db, "messages"), orderBy("createdAt"));
      onSnapshot(q, snapshot => {
        chatBox.innerHTML = "";
        snapshot.forEach(doc => {
          const msg = doc.data();
          const div = document.createElement("div");
          div.className = msg.uid === auth.currentUser.uid ? "own" : "other";
          div.innerHTML = `<strong>${msg.displayName}:</strong> ${msg.text}`;
          chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
      });
    }
  </script>
  <style>
    body { font-family: sans-serif; text-align: center; }
    #chat { border: 1px solid #ccc; height: 300px; width: 400px; margin: 10px auto; overflow-y: scroll; padding: 10px; }
    .own { text-align: right; background: #007bff; color: white; margin: 5px; padding: 8px; border-radius: 12px; display: inline-block; }
    .other { text-align: left; background: #e5e5ea; color: black; margin: 5px; padding: 8px; border-radius: 12px; display: inline-block; }
    #form { margin-top: 10px; display: none; justify-content: center; }
    #message { width: 300px; padding: 8px; }
    button { padding: 8px 12px; margin: 5px; }
  </style>
</head>
<body>
  <h2>🔥 Мессенджер на Firebase</h2>
  <button id="login">Войти через Google</button>
  <button id="logout" style="display:none;">Выйти</button>
  <div id="chat"></div>
  <form id="form">
    <input id="message" placeholder="Ваше сообщение..." />
    <button type="submit">➤</button>
  </form>
</body>
</html>
