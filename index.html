<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Google Auth DM with Search</title>
    <style>
        :root { --primary: #4285F4; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Логин */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #google-btn { padding: 12px 24px; font-size: 16px; cursor: pointer; background: white; border: 1px solid #dadce0; border-radius: 4px; display: flex; align-items: center; gap: 10px; }

        /* Сайдбар */
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-box { padding: 15px; border-bottom: 1px solid #eee; }
        .search-box input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        
        #user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f9f9f9; }
        .user-item:hover { background: #f8f9fa; }
        .user-item.active { background: #e8f0fe; border-left: 4px solid var(--primary); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; }
        .user-info { display: flex; flex-direction: column; }
        .user-email { font-size: 11px; color: #777; }

        /* Чат */
        #chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #f0f2f5; }
        .msg { padding: 8px 14px; border-radius: 18px; max-width: 70%; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; color: #202124; border-bottom-left-radius: 2px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; background: white; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        #sendBtn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 24px; cursor: pointer; transition: 0.2s; }
        #sendBtn:disabled { background: #ccc; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Messenger</h2>
    <button id="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Войти через Google
    </button>
</div>

<div id="sidebar">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск по email...">
    </div>
    <div id="user-list">
        <div style="padding: 20px; color: #888; text-align: center;">Введите email пользователя, чтобы начать общение</div>
    </div>
</div>

<div id="chat-main">
    <div id="chat-header" style="padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd;">Выберите чат</div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Введите сообщение..." disabled>
        <button id="sendBtn" disabled>Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs, orderBy, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let activeChatId = null;
    let unsubMessages = null;

    // --- Авторизация ---
    document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            // Сохраняем email для поиска!
            await setDoc(doc(db, "users", user.uid), {
                name: user.displayName,
                email: user.email.toLowerCase(), // В нижнем регистре для удобства поиска
                photo: user.photoURL
            }, { merge: true });
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    // --- ПОИСК ПОЛЬЗОВАТЕЛЯ ---
    const searchInput = document.getElementById('searchInput');
    searchInput.oninput = async (e) => {
        const email = e.target.value.trim().toLowerCase();
        const userList = document.getElementById('user-list');
        
        if (email.length < 3) return; // Начинаем поиск от 3-х символов

        // Ищем в Firestore пользователя с таким email
        const q = query(collection(db, "users"), where("email", "==", email));
        const querySnapshot = await getDocs(q);
        
        userList.innerHTML = "";
        
        if (querySnapshot.empty) {
            userList.innerHTML = '<div style="padding:20px; color:red; font-size:12px;">Пользователь не найден</div>';
            return;
        }

        querySnapshot.forEach((uDoc) => {
            if (uDoc.id === currentUser.uid) return;
            const data = uDoc.data();
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <img class="user-avatar" src="${data.photo}">
                <div class="user-info">
                    <strong>${data.name}</strong>
                    <span class="user-email">${data.email}</span>
                </div>
            `;
            div.onclick = () => selectChat(uDoc.id, data.name, div);
            userList.appendChild(div);
        });
    };

    // --- Выбор чата и сообщения ---
    function selectChat(targetUid, targetName, el) {
        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('chat-header').textContent = targetName;
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;

        activeChatId = [currentUser.uid, targetUid].sort().join("_");
        
        if (unsubMessages) unsubMessages();
        const q = query(collection(db, "chats", activeChatId, "messages"), orderBy("timestamp", "asc"));
        
        unsubMessages = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            snapshot.forEach(mDoc => {
                const m = mDoc.data();
                const div = document.createElement('div');
                div.className = `msg ${m.senderId === currentUser.uid ? 'sent' : 'received'}`;
                div.textContent = m.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    // --- Отправка ---
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeChatId) return;

        await addDoc(collection(db, "chats", activeChatId, "messages"), {
            senderId: currentUser.uid,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();

</script>
</body>
</html>
