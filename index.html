<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Supabase Group List</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .user-item { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        #myinfo { font-weight: bold; margin-bottom: 20px; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="myinfo">Загрузка данных профиля...</div>
    
    <h3>Список группы:</h3>
    <div id="grouplist"></div>

    <script type="module">
        // 1. Импорт библиотеки Supabase
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // 2. Конфигурация подключения
        const URL = 'https://rncerhgizyjhovbdpqnl.supabase.co';
        const KEY = 'sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA';
        const supabase = createClient(URL, KEY);

        // ID вашего пользователя (из скриншота)
        const MY_ID = 'f455f564-7f46-4a23-b6c1-df0c5176a406';

        /**
         * Функция для обновления статуса текущего пользователя
         * Вызывается из консоли или по нажатию кнопок (например: changeStatus('На связи', 'green'))
         */
        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error('Ошибка обновления:', error);
            } else {
                console.log('Статус обновлен!');
                fetchGroup(); // Сразу обновляем список на экране
            }
        };

        /**
         * Функция получения списка всех пользователей и отрисовки HTML
         */
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error('Ошибка при получении данных:', error);
                return;
            }

            // Отрисовка списка
            const list = document.getElementById('grouplist');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username || 'Без имени'}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            // Обновление информации о текущем пользователе
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myinfo').innerText = `Вы зашли как: ${me.username}`;
            }
        }

        // Запускаем первичную загрузку
        fetchGroup();

        // Устанавливаем интервал автообновления (каждые 5 секунд)
        setInterval(fetchGroup, 5000);

    </script>
</body>
</html>
