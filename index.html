<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Авторизация -->
        <div id="authSection" class="auth-section">
            <h2>Вход в мессенджер</h2>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" class="input-field">
                <input type="password" id="loginPassword" placeholder="Пароль" class="input-field">
                <button onclick="login()" class="btn-primary">Войти</button>
            </div>
            
            <div id="registerForm" class="auth-form">
                <input type="text" id="regName" placeholder="Имя" class="input-field">
                <input type="email" id="regEmail" placeholder="Email" class="input-field">
                <input type="password" id="regPassword" placeholder="Пароль" class="input-field">
                <button onclick="register()" class="btn-primary">Зарегистрироваться</button>
            </div>
        </div>

        <!-- Основной интерфейс мессенджера -->
        <div id="messengerSection" style="display: none;">
            <div class="messenger-header">
                <div class="user-info">
                    <span id="currentUserName"></span>
                    <button onclick="logout()" class="btn-logout">Выйти</button>
                </div>
            </div>
            
            <div class="messenger-layout">
                <!-- Список чатов -->
                <div class="chats-list">
                    <div class="search-box">
                        <input type="text" id="searchUsers" placeholder="Поиск пользователей..." 
                               onkeyup="searchUsers()" class="input-field">
                    </div>
                    <div id="usersList" class="users-list"></div>
                </div>
                
                <!-- Область сообщений -->
                <div class="chat-area">
                    <div id="chatHeader" class="chat-header">
                        <h3 id="selectedUserName">Выберите чат</h3>
                    </div>
                    <div id="messagesContainer" class="messages-container"></div>
                    <div class="message-input-area">
                        <textarea id="messageInput" placeholder="Введите сообщение..." 
                                  class="message-input" rows="3"></textarea>
                        <button onclick="sendMessage()" class="btn-send">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
