<div id="database-viewer" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px;">
    <h3>Содержимое базы данных:</h3>
    <div id="data-container">Загрузка данных...</div>
    <button onclick="refreshData()" style="margin-top: 10px;">Обновить вручную</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Основная функция получения данных
    async function fetchExistingData() {
        const container = document.getElementById('data-container');
        
        try {
            // 1. Ссылка на коллекцию (убедитесь, что название 'messages' совпадает с тем, куда вы писали данные)
            const colRef = collection(db, "messages");
            
            // 2. Создаем запрос (опционально: сортировка по времени)
            const q = query(colRef, orderBy("createdAt", "desc"));
            
            // 3. Получаем "снимок" всех документов
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                container.innerHTML = "<p>В базе данных пока нет записей.</p>";
                return;
            }

            // 4. Очищаем контейнер и выводим данные в цикле
            container.innerHTML = ""; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : "Дата не указана";
                
                container.innerHTML += `
                    <div style="background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; border-radius: 5px;">
                        <strong>ID документа:</strong> ${doc.id}<br>
                        <strong>Пользователь:</strong> ${data.user || 'Аноним'}<br>
                        <strong>Сообщение:</strong> ${data.text || 'Пусто'}<br>
                        <small style="color: gray;">Время: ${date}</small>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Ошибка при получении данных:", error);
            container.innerHTML = "<p style='color: red;'>Ошибка доступа. Проверьте настройки Rules в Firebase Console.</p>";
        }
    }

    // Запускаем при загрузке
    fetchExistingData();

    // Делаем функцию доступной для кнопки
    window.refreshData = fetchExistingData;
</script>
