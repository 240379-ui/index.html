<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase Viewer - Requests</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .request-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; }
        .request-id { font-size: 0.8em; color: #888; }
        .field { margin: 5px 0; }
        button { background: #f57c00; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #e64a19; }
    </style>
</head>
<body>

<div class="container">
    <h2>Данные из коллекции: requests</h2>
    <button id="loadBtn">Обновить данные</button>
    <div id="output" style="margin-top: 20px;">Нажмите кнопку для загрузки...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ФУНКЦИЯ ПОЛУЧЕНИЯ ДАННЫХ
    async function getRequests() {
        const output = document.getElementById('output');
        output.innerHTML = "Загрузка...";

        try {
            // Указываем именно вашу коллекцию 'requests'
            const querySnapshot = await getDocs(collection(db, "requests"));
            output.innerHTML = "";

            if (querySnapshot.empty) {
                output.innerHTML = "Коллекция 'requests' пуста.";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Создаем карточку для каждого документа
                const card = document.createElement('div');
                card.className = 'request-card';
                
                // Генерируем содержимое на основе полей в документе
                let fieldsHtml = `<div class="request-id">ID: ${doc.id}</div>`;
                for (const [key, value] of Object.entries(data)) {
                    fieldsHtml += `<div class="field"><strong>${key}:</strong> ${JSON.stringify(value)}</div>`;
                }
                
                card.innerHTML = fieldsHtml;
                output.appendChild(card);
            });
        } catch (e) {
            console.error(e);
            output.innerHTML = "Ошибка доступа. Проверьте Rules в Firebase Console.";
        }
    }

    document.getElementById('loadBtn').addEventListener('click', getRequests);
    // Автозапуск при загрузке
    getRequests();
</script>
</body>
</html>
