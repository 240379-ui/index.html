<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление статусом группы</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #myinfo { margin-bottom: 20px; padding: 10px; background: #e8f4fd; border-radius: 8px; font-weight: bold; color: #007bff; }
        
        /* Стили списка */
        .user-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: background 0.3s; }
        .user-item:last-child { border-bottom: none; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; margin-right: 15px; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .user-details strong { display: block; font-size: 1.1em; }
        .user-details small { color: #777; font-size: 0.9em; }

        /* Кнопки управления */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.3s; color: white; }
        button:active { transform: scale(0.98); }
        .btn-online { background-color: #28a745; }
        .btn-busy { background-color: #dc3545; }
        .btn-away { background-color: #ffc107; color: #333; }
        .btn-offline { background-color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <div id="myinfo">Подключение к базе...</div>

    <div class="controls">
        <button class="btn-online" onclick="changeStatus('На связи', '#28a745')">На связи</button>
        <button class="btn-busy" onclick="changeStatus('Занят', '#dc3545')">Занят</button>
        <button class="btn-away" onclick="changeStatus('Отойду', '#ffc107')">Отойду</button>
        <button class="btn-offline" onclick="changeStatus('Не в сети', '#6c757d')">Оффлайн</button>
    </div>

    <h3>Список группы:</h3>
    <div id="grouplist">Загрузка пользователей...</div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Твои новые ключи
    const URL = 'https://yhlulkexiyalevwcuqka.supabase.co';
    const KEY = 'sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA';
    const MY_ID = 'f455f564-7f46-4a23-b6c1-df0c5176a406';

    const supabase = createClient(URL, KEY);

    // Функция обновления (теперь она привязана к кнопкам выше)
    window.changeStatus = async (text, color) => {
        const { error } = await supabase
            .from('profiles')
            .update({ status: text, color: color })
            .eq('id', MY_ID);

        if (error) {
            console.error("Ошибка обновления:", error);
            alert("Ошибка! Проверь RLS политики: " + error.message);
        } else {
            fetchGroup();
        }
    };

    // Функция получения данных
    async function fetchGroup() {
        const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .order('username', { ascending: true });

        if (error) {
            console.error("Ошибка загрузки:", error);
            document.getElementById('grouplist').innerText = "Ошибка загрузки: " + error.message;
            return;
        }

        const list = document.getElementById('grouplist');
        if (data.length === 0) {
            list.innerText = "В таблице пока нет записей.";
            return;
        }

        list.innerHTML = data.map(user => `
            <div class="user-item">
                <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                <div class="user-details">
                    <strong>${user.username || 'Без имени'}</strong>
                    <small>${user.status || 'Статус не задан'}</small>
                </div>
            </div>
        `).join('');

        const me = data.find(u => u.id === MY_ID);
        if (me) {
            document.getElementById('myinfo').innerText = `Вы зашли как: ${me.username}`;
        } else {
            document.getElementById('myinfo').innerText = `ID не найден в базе!`;
        }
    }

    // Запуск
    fetchGroup();
    setInterval(fetchGroup, 5000); // Обновлять каждые 5 сек
</script>

</body>
</html>
