<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Messenger</title>
    <style>
        :root { --main-green: #075e54; --incoming: #ffffff; --outgoing: #dcf8c6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #e5ddd5; }
        
        .sidebar { width: 300px; background: white; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; }
        
        .header { background: #ededed; padding: 10px; display: flex; align-items: center; gap: 10px; font-weight: bold; border-bottom: 1px solid #ddd; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Стиль WhatsApp */
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 10px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .sent { align-self: flex-end; background: var(--outgoing); }
        .received { align-self: flex-start; background: var(--incoming); }
        .bubble img { width: 100%; border-radius: 5px; margin-top: 5px; }
        .time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }

        .footer { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; border: none; padding: 10px; border-radius: 20px; outline: none; }
        
        #auth-gate { position: fixed; inset: 0; background: white; z-index: 100; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="auth-gate"><button id="loginBtn" style="padding:15px; background:#4285f4; color:white; border:none; cursor:pointer;">Войти через Google</button></div>

<div class="sidebar">
    <div class="header">Чаты</div>
    <div style="padding: 10px;">
        <input type="email" id="targetEmail" placeholder="Email собеседника..." style="width: 80%; padding: 5px;">
        <button onclick="startChat()" style="cursor:pointer;">🔍</button>
    </div>
    <div id="status" style="padding: 10px; font-size: 12px; color: green;"></div>
</div>

<div class="main">
    <div class="header" id="chatHeader">Выберите чат</div>
    <div id="messages"></div>
    <div class="footer" id="inputBar" style="display: none;">
        <input type="file" id="imgFile" accept="image/*" style="width: 80px;">
        <input type="text" id="msgText" placeholder="Введите сообщение...">
        <button id="sendBtn" style="background:var(--main-green); color:white; border:none; padding:10px 15px; border-radius:50%; cursor:pointer;">➤</button>
    </div>
</div>

<script type="module">
    // 1. Обязательные импорты (без них будут ошибки 'is not defined')
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getAuth, 
        signInWithPopup, 
        GoogleAuthProvider, 
        onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        query, 
        orderBy, 
        onSnapshot, 
        serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // 2. Ваша конфигурация (Project: qazaq-a072e)
    const firebaseConfig = {
        apiKey: "AIzaSyDgUXROTXafc_qA-rpdSzKn33265IfxsHU",
        authDomain: "qazaq-a072e.firebaseapp.com",
        projectId: "qazaq-a072e",
        storageBucket: "qazaq-a072e.firebasestorage.app",
        messagingSenderId: "47025480090",
        appId: "1:47025480090:web:3dd74ff29bc0c149f39a23"
    };

    // 3. Инициализация сервисов
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const imgbbKey = "f7dc2e47cafbeb566657f257117c4ef0";

    let activeChatId = null;
    let unsub = null;

    // --- ФУНКЦИЯ ВХОДА ---
    document.getElementById('loginBtn').onclick = async () => {
        try {
            // Теперь эта функция определена благодаря импорту выше
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Ошибка входа:", error);
            alert("Ошибка входа: " + error.message);
        }
    };

    // Отслеживание состояния входа
    onAuthStateChanged(auth, (user) => {
        const gate = document.getElementById('auth-gate');
        if (user) {
            if (gate) gate.style.display = 'none';
            console.log("Авторизован:", user.email);
        } else {
            if (gate) gate.style.display = 'flex';
        }
    });

    // --- ЛОГИКА ЧАТА ---
    window.startChat = () => {
        const target = document.getElementById('targetEmail').value.trim().toLowerCase();
        if (!target || target === auth.currentUser.email) return alert("Введите чужой Email");

        activeChatId = [auth.currentUser.email, target].sort().join("_").replace(/\./g, ",");
        document.getElementById('chatHeader').innerText = "Чат с: " + target;
        document.getElementById('inputBar').style.display = 'flex';
        
        listenToMessages();
    };

    function listenToMessages() {
        if (unsub) unsub();
        const q = query(collection(db, "chats", activeChatId, "messages"), orderBy("timestamp", "asc"));
        
        unsub = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isSent = m.sender === auth.currentUser.email;
                box.innerHTML += `
                    <div class="bubble ${isSent ? 'sent' : 'received'}">
                        ${m.text || ""}
                        ${m.img ? `<img src="${m.img}">` : ""}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgText').value;
        if (!text && !activeChatId) return;

        await addDoc(collection(db, "chats", activeChatId, "messages"), {
            sender: auth.currentUser.email,
            text: text,
            timestamp: serverTimestamp()
        });
        document.getElementById('msgText').value = "";
    };
</script>
