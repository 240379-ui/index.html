<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DM Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 250px;
  background: #1f1f1f;
  padding: 10px;
  overflow-y: auto;
}

.user {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #333;
}

.user:hover {
  background: #333;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 60%;
}

.me {
  background: #25d366;
  align-self: flex-end;
}

.other {
  background: #333;
}

.input {
  display: flex;
  padding: 10px;
  background: #1f1f1f;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #25d366;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="users"></div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msg" placeholder="Сообщение...">
    <button onclick="send()">➤</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
  authDomain: "database-375f4.firebaseapp.com",
  projectId: "database-375f4",
  storageBucket: "database-375f4.firebasestorage.app",
  messagingSenderId: "155181454067",
  appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const provider = new GoogleAuthProvider();

let currentUser = null;
let currentChatUser = null;

// 🔑 LOGIN
signInWithPopup(auth, provider);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    // сохранить пользователя
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName,
      uid: user.uid
    });

    loadUsers();
  }
});

// 👥 USERS
function loadUsers() {
  onSnapshot(collection(db, "users"), (snapshot) => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "";

    snapshot.forEach((docu) => {
      const u = docu.data();

      if (u.uid === currentUser.uid) return;

      const div = document.createElement("div");
      div.className = "user";
      div.innerText = u.name;

      div.onclick = () => {
        currentChatUser = u;
        loadMessages();
      };

      usersDiv.appendChild(div);
    });
  });
}

// 💬 SEND MESSAGE
async function send() {
  const text = document.getElementById("msg").value;

  if (!text || !currentChatUser) return;

  await addDoc(collection(db, "messages"), {
    text,
    sender: currentUser.uid,
    receiver: currentChatUser.uid,
    createdAt: new Date()
  });

  document.getElementById("msg").value = "";
}

// 📥 LOAD MESSAGES
function loadMessages() {
  const messagesDiv = document.getElementById("messages");

  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    messagesDiv.innerHTML = "";

    snapshot.forEach((docu) => {
      const m = docu.data();

      if (
        (m.sender === currentUser.uid && m.receiver === currentChatUser.uid) ||
        (m.sender === currentChatUser.uid && m.receiver === currentUser.uid)
      ) {
        const div = document.createElement("div");

        div.className = "msg " + (m.sender === currentUser.uid ? "me" : "other");
        div.innerText = m.text;

        messagesDiv.appendChild(div);
      }
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

window.send = send;

</script>

</body>
</html>
