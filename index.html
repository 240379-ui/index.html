<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase DM System</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Боковая панель пользователей */
        #sidebar { width: 250px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #sidebar h3 { padding: 15px; margin: 0; border-bottom: 1px solid #ddd; font-size: 16px; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; transition: 0.2s; }
        .user-item:hover { background: #f0f7ff; }
        .user-item.active { background: #e7f3ff; font-weight: bold; color: var(--primary); }

        /* Окно чата */
        #chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        #chat-header { padding: 15px; border-bottom: 1px solid #ddd; font-weight: bold; background: #fff; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        
        /* Пузыри сообщений */
        .msg { padding: 8px 12px; border-radius: 18px; max-width: 70%; word-wrap: break-word; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 2px; }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { padding: 8px 20px; border: none; background: var(--primary); color: white; border-radius: 20px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Мои контакты</h3>
    <div id="user-list">Загрузка пользователей...</div>
</div>

<div id="chat-main">
    <div id="chat-header">Выберите, кому написать</div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Сообщение..." disabled>
        <button id="sendBtn" disabled>Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ИМИТАЦИЯ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ ---
    // В реальности тут должен быть Firebase Auth (например, user.uid)
    const MY_ID = "current_user_1"; 
    const MY_NAME = "Я (Admin)";

    let activeChatId = null;
    let unsubscribeMessages = null;

    // 1. Регистрируем себя в базе (чтобы другие нас видели)
    await setDoc(doc(db, "users", MY_ID), { name: MY_NAME, online: true }, { merge: true });

    // 2. Подгружаем список ВСЕХ пользователей из базы
    onSnapshot(collection(db, "users"), (snapshot) => {
        const userList = document.getElementById('user-list');
        userList.innerHTML = "";
        snapshot.forEach(uDoc => {
            if (uDoc.id !== MY_ID) { // Не показываем себя в списке
                const user = uDoc.data();
                const div = document.createElement('div');
                div.className = 'user-item';
                div.textContent = user.name || uDoc.id;
                div.onclick = () => selectUser(uDoc.id, user.name || uDoc.id, div);
                userList.appendChild(div);
            }
        });
    });

    // 3. Логика выбора пользователя
    function selectUser(targetUserId, targetName, element) {
        // Подсвечиваем активного
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        document.getElementById('chat-header').textContent = "Чат с: " + targetName;
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;

        // Создаем уникальный ID чата (всегда одинаковый для этой пары людей)
        activeChatId = [MY_ID, targetUserId].sort().join("_");

        loadMessages(activeChatId);
    }

    // 4. Загрузка сообщений конкретного чата
    function loadMessages(chatId) {
        if (unsubscribeMessages) unsubscribeMessages(); // Отписываемся от старого чата

        const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
        
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = `msg ${data.senderId === MY_ID ? 'sent' : 'received'}`;
                div.textContent = data.text;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }

    // 5. Отправка
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !activeChatId) return;

        await addDoc(collection(db, "chats", activeChatId, "messages"), {
            senderId: MY_ID,
            text: text,
            timestamp: serverTimestamp()
        });
        input.value = "";
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

</script>
</body>
</html>
