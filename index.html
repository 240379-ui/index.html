<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Study Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1a1d2b;
            --accent: #00f2ff;
            --text: #ffffff;
            --gray: #8b8e9f;
        }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        h3 { margin: 0 0 15px 0; font-size: 16px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }

        /* ТАЙМЕР И ПРОФИЛЬ */
        .timer-display { font-size: 48px; font-weight: 800; color: var(--accent); margin: 10px 0; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left; }
        .avatar { width: 50px; height: 50px; border-radius: 12px; background: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        
        /* КНОПКИ */
        .btn { border: none; border-radius: 12px; padding: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; width: 100%; }
        .btn-main { background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; }
        .btn-stop { background: #ff4b5c; color: white; margin-top: 10px; }
        .btn-outline { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .row { display: flex; gap: 10px; margin-top: 10px; }

        /* РЕЙТИНГ И СПИСКИ (КАК НА ФОТО) */
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; }
        .info { display: flex; align-items: center; gap: 10px; }
        .name { font-weight: 600; font-size: 14px; }
        .time-label { color: var(--accent); font-size: 12px; font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .badge-mini { font-size: 12px; }

        /* ЧАТ */
        .chat-box { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; margin-bottom: 10px; font-size: 13px; text-align: left; }
        .msg { margin-bottom: 5px; }
        .msg b { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <!-- БЛОК СЕССИИ -->
    <div id="auth-ui" class="card" style="display:none;">
        <h3>Сессия учёбы</h3>
        <div id="my-name-display" style="font-size: 18px; font-weight: bold; margin-bottom: 5px;">Пользователь</div>
        <div class="timer-display"><span id="timer-sec">0</span> сек.</div>
        <div id="my-badges-row" style="margin-bottom: 15px;"></div>
        
        <button class="btn btn-main" onclick="updateStatus('Учится')">▶ Продолжить / Обновить</button>
        <button class="btn btn-stop" onclick="updateStatus('Завершил сессию', true)">■ Завершить</button>
        <div class="row">
            <button class="btn btn-outline" onclick="updateStatus('На перерыве')">☕ Перерыв</button>
            <button class="btn btn-outline" onclick="handleLogout()">Выход</button>
        </div>
    </div>

    <div id="login-ui" class="card">
        <button class="btn btn-main" onclick="handleLogin()">Войти через Google</button>
    </div>

    <!-- ТОП СТУДЕНТОВ -->
    <div class="card">
        <h3>🏆 ТОП СТУДЕНТОВ</h3>
        <div id="leaderboard"></div>
    </div>

    <!-- СТАТУСЫ ГРУППЫ -->
    <div class="card">
        <h3>🎥 СТАТУСЫ ГРУППЫ</h3>
        <div id="group-list"></div>
    </div>

    <!-- ЧАТ -->
    <div class="card">
        <h3>💬 ЧАТ</h3>
        <div id="chat-box" class="chat-box"></div>
        <form id="chat-form" style="display:flex; gap:5px;">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="flex:1; background:#000; border:none; border-radius:8px; padding:10px; color:white;">
            <button type="submit" class="btn btn-main" style="width:50px; padding:10px;">></button>
        </form>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://yhlulkexiyalevwcuqka.supabase.co';
    const KEY = 'sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA';
    const supabase = createClient(URL, KEY);

    let me = null;
    let myProfile = { total_time: 0, badges: [] };
    let sessionSeconds = 0;
    let onlineUsers = {};

    const ACHIEVEMENTS = {
        early_bird: '🌅',
        marathon: '🏃',
        activist: '💬'
    };

    // 1. ВХОД
    window.handleLogin = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    window.handleLogout = async () => { await supabase.auth.signOut(); location.reload(); };

    // 2. ОБНОВЛЕНИЕ ДАННЫХ
    window.updateStatus = async (newStatus, resetTimer = false) => {
        if (!me) return;

        let newBadges = [...(myProfile.badges || [])];
        
        // Достижение: Марафонец (сделал 10 сек для теста, измени на 7200 для 2 часов)
        if (sessionSeconds >= 10 && !newBadges.includes('marathon')) {
            newBadges.push('marathon');
            alert("Получено достижение: Марафонец! 🏃");
        }

        // Достижение: Ранняя пташка
        if (new Date().getHours() < 8 && !newBadges.includes('early_bird')) newBadges.push('early_bird');

        const { error } = await supabase.from('Profile').upsert({
            id: me.id,
            username: me.user_metadata.full_name,
            status: newStatus,
            total_time: (myProfile.total_time || 0) + sessionSeconds,
            badges: newBadges
        });

        if (resetTimer) sessionSeconds = 0;
        loadMyProfile(); // Перезагрузить свои данные
    };

    async function loadMyProfile() {
        const { data } = await supabase.from('Profile').select('*').eq('id', me.id).single();
        if (data) {
            myProfile = data;
            document.getElementById('my-badges-row').innerHTML = (data.badges || []).map(b => ACHIEVEMENTS[b]).join(' ');
        }
    }

    async function start() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            me = session.user;
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('my-name-display').innerText = me.user_metadata.full_name;
            
            await loadMyProfile();
            connectRealtime();
            setInterval(() => { sessionSeconds++; document.getElementById('timer-sec').innerText = sessionSeconds; }, 1000);
        }
        syncAll();
    }

    function connectRealtime() {
        const channel = supabase.channel('room_1', { config: { presence: { key: me.id } } });
        channel
            .on('presence', { event: 'sync' }, () => { onlineUsers = channel.presenceState(); syncAll(); })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => syncAll())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'Profile' }, () => syncAll())
            .subscribe(async (s) => { if (s === 'SUBSCRIBED') await channel.track({ online_at: new Date() }); });
    }

    async function syncAll() {
        // Загрузка чата
        const { data: msgs } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
        if (msgs) document.getElementById('chat-box').innerHTML = msgs.reverse().map(m => `<div class="msg"><b>${m.user_name}:</b> ${m.content}</div>`).join('');

        // Загрузка ТОПА и СТАТУСОВ
        const { data: profiles } = await supabase.from('Profile').select('*').order('total_time', { ascending: false });
        if (profiles) {
            // ТОП
            document.getElementById('leaderboard').innerHTML = profiles.slice(0, 5).map((p, i) => `
                <div class="list-item">
                    <div class="info">
                        <span style="color:#555; width:20px;">${i+1}</span>
                        <span class="name">${p.username}</span>
                    </div>
                    <span class="time-label">${Math.floor(p.total_time / 60)}м ${p.total_time % 60}с</span>
                </div>
            `).join('');

            // ГРУППА
            document.getElementById('group-list').innerHTML = profiles.map(p => `
                <div class="list-item">
                    <div class="info">
                        <div class="status-dot ${onlineUsers[p.id] ? 'online' : ''}"></div>
                        <div>
                            <div class="name">${p.username} ${(p.badges || []).map(b => ACHIEVEMENTS[b]).join('')}</div>
                            <div style="font-size:11px; color:#666;">${p.status || 'Не в сети'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    document.getElementById('chat-form').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (!input.value) return;
        await supabase.from('messages').insert({ user_name: me.user_metadata.full_name, content: input.value });
        input.value = '';
    };

    start();
</script>
</body>
</html>
