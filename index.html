<!DOCTYPE html>
<html>
<head>
    <title>Firebase Data Viewer</title>
</head>
<body>

<h2>Данные из Firebase</h2>
<button onclick="getAllData()">Загрузить данные</button>

<pre id="output"></pre>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
    // 🔑 ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
  authDomain: "database-375f4.firebaseapp.com",
  projectId: "database-375f4",
  storageBucket: "database-375f4.firebasestorage.app",
  messagingSenderId: "155181454067",
  appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
  measurementId: "G-TB3G4KSQ8S"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    // Инициализация
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🔥 Функция: получить все данные
    async function getAllData() {
        const output = document.getElementById("output");
        output.textContent = "Загрузка...\n";

        try {
            const collections = await db.listCollections();

            for (const collection of collections) {
                output.textContent += `\n=== Коллекция: ${collection.id} ===\n`;

                const snapshot = await collection.get();

                snapshot.forEach(doc => {
                    output.textContent += `ID: ${doc.id}\n`;

                    const data = doc.data();
                    for (const key in data) {
                        output.textContent += `${key}: ${data[key]}\n`;
                    }

                    output.textContent += "---------------------\n";
                });
            }
        } catch (error) {
            output.textContent += "Ошибка: " + error;
        }
    }
</script>

</body>
</html>
