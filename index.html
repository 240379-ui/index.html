<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; height: 100vh; }
        
        /* Auth */
        .auth-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-box h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .auth-tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #eee; }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #666;
        }
        .tab-btn.active { color: #667eea; border-bottom: 2px solid #667eea; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        
        /* Messenger */
        .messenger { display: flex; gap: 20px; height: calc(100vh - 100px); }
        .users-panel {
            width: 300px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .users-header {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box { padding: 15px; border-bottom: 1px solid #eee; }
        .users-list { flex: 1; overflow-y: auto; }
        .user-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .user-item:hover { background: #f5f5f5; }
        .user-item.selected {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-left: 3px solid #667eea;
        }
        .chat-area {
            flex: 1;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: white;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
        }
        .message.sent .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.received .message-content {
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-time { font-size: 11px; margin-top: 5px; color: #999; }
        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
        }
        .btn-logout {
            padding: 8px 20px;
            background: #f44336;
            width: auto;
        }
        @media (max-width: 768px) {
            .messenger { flex-direction: column; }
            .users-panel { width: 100%; height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth -->
        <div id="authSection">
            <div class="auth-box">
                <h2>💬 Private Messenger</h2>
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
                    <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
                </div>
                <div id="loginForm" class="auth-form active">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button onclick="login()">Войти</button>
                </div>
                <div id="registerForm" class="auth-form">
                    <input type="text" id="regName" placeholder="Имя">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button onclick="register()">Зарегистрироваться</button>
                </div>
            </div>
        </div>

        <!-- Messenger -->
        <div id="messengerSection" style="display: none;">
            <div class="users-panel">
                <div class="users-header">
                    <span id="userName"></span>
                    <button class="btn-logout" onclick="logout()">Выйти</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUsers" placeholder="🔍 Поиск..." onkeyup="searchUsers()">
                </div>
                <div id="usersList" class="users-list"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <h3 id="chatWith">Выберите чат</h3>
                </div>
                <div id="messages" class="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button onclick="sendMessage()">📤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, onSnapshot, orderBy, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
            authDomain: "database-375f4.firebaseapp.com",
            projectId: "database-375f4",
            storageBucket: "database-375f4.firebasestorage.app",
            messagingSenderId: "155181454067",
            appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
            measurementId: "G-TB3G4KSQ8S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentChatUser = null;
        let unsubscribeMessages = null;

        // Auth functions
        window.switchTab = (tab) => {
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        };

        window.register = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if (!name || !email || !password) return alert('Заполните все поля');
            try {
                const user = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(user.user, { displayName: name });
                await setDoc(doc(db, "users", user.user.uid), { uid: user.user.uid, name, email, createdAt: new Date().toISOString() });
                alert('Регистрация успешна!');
            } catch (error) { alert(error.message); }
        };

        window.login = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return alert('Заполните все поля');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) { alert(error.message); }
        };

        window.logout = async () => {
            await signOut(auth);
            if (unsubscribeMessages) unsubscribeMessages();
            currentChatUser = null;
        };

        // Send message
        window.sendMessage = async () => {
            if (!currentChatUser) return alert('Выберите собеседника');
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const user = auth.currentUser;
            if (!user) return;
            const chatId = [user.uid, currentChatUser.uid].sort().join('_');
            await addDoc(collection(db, "messages"), {
                chatId, senderId: user.uid, receiverId: currentChatUser.uid,
                text, timestamp: new Date().toISOString(), read: false
            });
            await setDoc(doc(db, "chats", chatId), {
                participants: [user.uid, currentChatUser.uid],
                lastMessage: text, lastMessageTime: new Date().toISOString()
            }, { merge: true });
            input.value = '';
        };

        // Load users
        async function loadUsers() {
            const user = auth.currentUser;
            if (!user) return;
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';
            const snapshot = await getDocs(query(collection(db, "users")));
            snapshot.forEach(doc => {
                const u = doc.data();
                if (u.uid !== user.uid) {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `<div><strong>${u.name || u.email}</strong><br><small>${u.email}</small></div>`;
                    div.onclick = () => selectUser(u);
                    usersList.appendChild(div);
                }
            });
        }

        window.searchUsers = () => {
            const search = document.getElementById('searchUsers').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(search) ? 'block' : 'none';
            });
        };

        // Select user
        async function selectUser(user) {
            if (unsubscribeMessages) unsubscribeMessages();
            currentChatUser = user;
            document.getElementById('chatWith').innerHTML = `💬 ${user.name || user.email}`;
            document.querySelectorAll('.user-item').forEach(item => item.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            loadMessages();
        }

        // Load messages
        function loadMessages() {
            const user = auth.currentUser;
            if (!user || !currentChatUser) return;
            const chatId = [user.uid, currentChatUser.uid].sort().join('_');
            const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const isSent = m.senderId === user.uid;
                    const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const div = document.createElement('div');
                    div.className = `message ${isSent ? 'sent' : 'received'}`;
                    div.innerHTML = `<div class="message-content">${escapeHtml(m.text)}</div><div class="message-time">${time}</div>`;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('messengerSection').style.display = 'flex';
                document.getElementById('userName').innerHTML = `👤 ${user.displayName || user.email}`;
                loadUsers();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('messengerSection').style.display = 'none';
                if (unsubscribeMessages) unsubscribeMessages();
                currentChatUser = null;
            }
        });
    </script>
</body>
</html>
