<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Work Session</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f0f7ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; }
        
        .timer { font-size: 30px; font-weight: bold; color: #3b82f6; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn { width: 100%; border: none; border-radius: 12px; padding: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-red { background: #ef4444; color: white; margin-bottom: 10px; }
        .btn-warn { background: #fbbf24; flex: 1; }
        .btn-gray { background: #6b7280; color: white; flex: 1; }
        .row { display: flex; gap: 10px; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid #f1f5f9; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; }
        .dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e; } /* Зеленый онлайн */

        .chat-box { height: 150px; background: #f8fafc; border-radius: 12px; padding: 10px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #e2e8f0; font-size: 14px; }
        .chat-input { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; }
        .btn-send { background: #10b981; color: white; border: none; width: 45px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="app-ui" style="display:none;">
        <div id="user-name" style="font-weight: bold; font-size: 18px;">Загрузка...</div>
        <div class="timer">⏱️ <span id="sec-count">0</span> сек.</div>
        <button class="btn btn-red" onclick="setStatus('Завершил сессию')">⛔ Завершить сессию</button>
        <div class="row">
            <button class="btn btn-warn" onclick="setStatus('На перерыве')">☕ Перерыв</button>
            <button class="btn btn-gray" onclick="logout()">Выход</button>
        </div>
    </div>

    <div class="card" id="login-ui">
        <button class="btn" style="background:white; border: 1px solid #ddd;" onclick="login()">
            <img src="https://www.google.com/favicon.ico" width="16"> Войти через Google
        </button>
    </div>

    <div class="card">
        <div style="font-weight: bold; margin-bottom: 10px;">👥 Монитор группы</div>
        <div id="group-list">Загрузка участников...</div>
    </div>

    <div class="card">
        <div style="font-weight: bold; margin-bottom: 10px;">💬 Общий чат</div>
        <div id="chat-messages" class="chat-box"></div>
        <form id="chat-form" class="chat-input">
            <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
            <button type="submit" class="btn-send">➤</button>
        </form>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://yhlulkexiyalevwcuqka.supabase.co';
    const KEY = 'sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA';
    const supabase = createClient(URL, KEY);

    let user = null;
    let onlineUsers = {}; // Для Presence

    // Авторизация
    window.login = () => supabase.auth.signInWithOAuth({ provider: 'google' });
    window.logout = async () => { await supabase.auth.signOut(); location.reload(); };

    // Обновление статуса (Upsert)
    window.setStatus = async (status) => {
        if (!user) return;
        await supabase.from('Profile').upsert({
            id: user.id,
            username: user.user_metadata.full_name,
            status: status
        });
    };

    async function init() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (session) {
            user = session.user;
            document.getElementById('app-ui').style.display = 'block';
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('user-name').innerText = user.user_metadata.full_name;
            
            setupLive(); // Запуск Realtime
            startTimer();
        }

        renderAll();
    }

    function setupLive() {
        const channel = supabase.channel('main_room');

        channel
            // 1. Кто в сети прямо сейчас (зеленые точки)
            .on('presence', { event: 'sync' }, () => {
                onlineUsers = channel.presenceState();
                renderAll();
            })
            // 2. Живые изменения в базе (сообщения и статусы кнопок)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => renderAll())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'Profile' }, () => renderAll())
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await channel.track({ online_at: new Date().toISOString() });
                }
            });
    }

    async function renderAll() {
        // Рендер участников
        const { data: profiles } = await supabase.from('Profile').select('*').order('username');
        const list = document.getElementById('group-list');
        if (profiles) {
            list.innerHTML = profiles.map(p => {
                const isOnline = onlineUsers[p.id] ? 'online' : '';
                return `
                    <div class="list-item">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div class="dot ${isOnline}"></div>
                            <strong>${p.username}</strong>
                        </div>
                        <div style="font-size:12px; color:#3b82f6;">${p.status || 'В сети'}</div>
                    </div>
                `;
            }).join('');
        }

        // Рендер чата
        const { data: msgs } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
        const chatBox = document.getElementById('chat-messages');
        if (msgs) {
            chatBox.innerHTML = msgs.map(m => `<div><b>${m.user_name}:</b> ${m.content}</div>`).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // Отправка в чат
    document.getElementById('chat-form').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (!input.value || !user) return;

        await supabase.from('messages').insert([{
            user_name: user.user_metadata.full_name,
            content: input.value
        }]);
        input.value = '';
    };

    function startTimer() {
        let s = 0;
        setInterval(() => { s++; document.getElementById('sec-count').innerText = s; }, 1000);
    }

    init();
</script>
</body>
</html>
