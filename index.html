<!DOCTYPE html>
<html>
<head>
    <title>Firebase Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<h2>Данные из Firebase</h2>
<button onclick="loadData()">Загрузить данные</button>

<table id="dataTable">
    <thead>
        <tr id="tableHead"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
    // 🔑 ВСТАВЬ СВОИ ДАННЫЕ
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
  authDomain: "database-375f4.firebaseapp.com",
  projectId: "database-375f4",
  storageBucket: "database-375f4.firebasestorage.app",
  messagingSenderId: "155181454067",
  appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
  measurementId: "G-TB3G4KSQ8S"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadData() {
        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");

        tableHead.innerHTML = "";
        tableBody.innerHTML = "";

        const snapshot = await db.collection("users").get();

        let headersAdded = false;

        snapshot.forEach(doc => {
            const data = doc.data();

            // 🔹 Создаем заголовки таблицы
            if (!headersAdded) {
                let headers = "<th>ID</th>";
                for (let key in data) {
                    headers += `<th>${key}</th>`;
                }
                tableHead.innerHTML = headers;
                headersAdded = true;
            }

            // 🔹 Добавляем строки
            let row = `<tr><td>${doc.id}</td>`;
            for (let key in data) {
                row += `<td>${data[key]}</td>`;
            }
            row += "</tr>";

            tableBody.innerHTML += row;
        });
    }
</script>

</body>
</html>
