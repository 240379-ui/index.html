<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f111a; --card: #1a1d2b; --accent: #00f2ff; --gray: #8b8e9f; --online: #00ff88; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        h3 { margin: 0 0 15px 0; font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; text-align: left; }
        .timer { font-size: 54px; font-weight: 800; color: var(--accent); margin: 10px 0; text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .btn { border: none; border-radius: 12px; padding: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 8px; font-size: 14px;}
        .btn-main { background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; }
        .btn-stop { background: #ff4b5c; color: white; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .status-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--gray); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 12px; }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .info { display: flex; align-items: center; gap: 12px; text-align: left; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .dot.online { background: var(--online); box-shadow: 0 0 8px var(--online); }
        .chat-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 12px; text-align: left; font-size: 13px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);}
    </style>
</head>
<body>

<div class="container">
    <!-- БЛОК ПРОФИЛЯ -->
    <div id="auth-ui" class="card" style="display:none;">
        <h3 id="my-name">Загрузка...</h3>
        <div class="timer" id="timer-sec">0</div>
        <div id="my-badges" style="font-size: 24px; margin-bottom: 15px; min-height: 30px;"></div>
        
        <button class="btn btn-main" onclick="updateStatus('👨‍💻 Учится')">▶ Начать / Сохранить прогресс</button>
        <button class="btn btn-stop" onclick="updateStatus('💤 Завершил', true)">■ Завершить сессию</button>
        
        <div class="status-grid">
            <!-- Кнопки быстрых статусов (обновляют данные без перезагрузки) -->
            <button class="status-btn" onclick="setQuickStatus('🟢 В сети')">В сети</button>
            <button class="status-btn" onclick="setQuickStatus('🟡 Отошел')">Отошел</button>
            <button class="status-btn" onclick="setQuickStatus('🔴 Занят')">Занят</button>
            <button class="status-btn" onclick="setQuickStatus('🔘 Перерыв')">Перерыв</button>
        </div>
        <button class="btn" style="background:transparent; color:#888; border:1px solid #333; margin-top:15px;" onclick="handleLogout()">Выйти из аккаунта</button>
    </div>

    <!-- БЛОК ВХОДА -->
    <div id="login-ui" class="card">
        <h3>Вход в систему</h3>
        <button class="btn btn-main" onclick="handleLogin()">Войти через Google</button>
    </div>

    <!-- РЕЙТИНГ -->
    <div class="card">
        <h3>🏆 ТОП СТУДЕНТОВ</h3>
        <div id="leaderboard">Загрузка...</div>
    </div>

    <!-- ГРУППА -->
    <div class="card">
        <h3>👥 СТАТУСЫ ГРУППЫ</h3>
        <div id="group-list">Загрузка...</div>
    </div>

    <!-- ЧАТ -->
    <div class="card">
        <h3>💬 ЧАТ</h3>
        <div id="chat-box" class="chat-box"></div>
        <form id="chat-form" style="display:flex; gap:5px;">
            <input type="text" id="msg-input" placeholder="Введите сообщение..." style="flex:1; background:#000; border:1px solid #333; border-radius:8px; color:white; padding:10px; outline:none;">
            <button type="submit" class="btn btn-main" style="width:50px; margin:0; padding:0;">➤</button>
        </form>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // ВАШИ КЛЮЧИ SUPABASE
    const URL = 'https://yhlulkexiyalevwcuqka.supabase.co';
    const KEY = 'sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA';
    const supabase = createClient(URL, KEY);

    let me = null;
    let myProfile = { total_time: 0, badges: [] };
    let sessionSeconds = 0;
    let onlineUsers = {};

    const ACHIEVEMENTS = { early_bird: '🌅', marathon: '🏃', activist: '💬' };

    // --- АВТОРИЗАЦИЯ ---
    window.handleLogin = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    window.handleLogout = async () => { await supabase.auth.signOut(); location.reload(); };

    // --- ЛОГИКА СОХРАНЕНИЯ ВРЕМЕНИ И ДОСТИЖЕНИЙ ---
    window.updateStatus = async (newStatus, resetTimer = false) => {
        if (!me) return;
        
        const oldTime = myProfile.total_time || 0;
        const newTotalTime = oldTime + sessionSeconds;
        let newBadges = Array.isArray(myProfile.badges) ? [...myProfile.badges] : [];
        let earned = false;

        // Достижение: Марафонец (таймер > 10 сек для теста)
        if (sessionSeconds >= 10 && !newBadges.includes('marathon')) {
            newBadges.push('marathon'); earned = true;
        }
        
        // Достижение: Ранняя пташка (до 9:00 утра)
        if (new Date().getHours() < 9 && !newBadges.includes('early_bird')) {
            newBadges.push('early_bird'); earned = true;
        }

        if (earned) alert("🎉 Вы получили новое достижение!");

        const { error } = await supabase.from('Profile').upsert({
            id: me.id,
            username: me.user_metadata.full_name,
            status: newStatus,
            total_time: newTotalTime,
            last_seen: new Date().toISOString(),
            badges: newBadges 
        });

        if (error) {
            console.error("Ошибка сохранения:", error);
            alert("Ошибка сохранения! Проверьте базу.");
            return;
        }

        if (resetTimer) sessionSeconds = 0;
        await loadMyProfile();
        syncData(); // Обновление списков без перезагрузки страницы
    };

    // --- БЫСТРЫЕ СТАТУСЫ ---
    window.setQuickStatus = async (st) => {
        if (!me) return;
        
        // Отправляем новый статус в базу (в фоновом режиме)
        await supabase.from('Profile').update({ 
            status: st, 
            last_seen: new Date().toISOString() 
        }).eq('id', me.id);
        
        // Мгновенно обновляем интерфейс у себя
        syncData();
    };

    // --- ЗАГРУЗКА ЛИЧНЫХ ДАННЫХ ---
    async function loadMyProfile() {
        const { data } = await supabase.from('Profile').select('*').eq('id', me.id).single();
        if (data) {
            myProfile = data;
            const badgesArray = Array.isArray(data.badges) ? data.badges : [];
            const badgesHTML = badgesArray.map(b => ACHIEVEMENTS[b] || '').join(' ');
            document.getElementById('my-badges').innerHTML = badgesHTML || '<span style="font-size:12px;color:#666;">Пока нет значков</span>';
        }
    }

    // --- ФУНКЦИЯ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА (БЕЗ ПЕРЕЗАГРУЗКИ СТРАНИЦЫ) ---
    async function syncData() {
        // Загрузка ТОП студентов
        const { data: profiles } = await supabase.from('Profile').select('*').order('total_time', { ascending: false });
        
        if (profiles) {
            // Отрисовка ТОП-5
            document.getElementById('leaderboard').innerHTML = profiles.slice(0, 5).map((p, i) => `
                <div class="list-item">
                    <div class="info">
                        <span style="color:#555; width:15px;">${i+1}</span> 
                        <b style="font-size:14px;">${p.username || 'Без имени'}</b>
                    </div>
                    <span style="color:var(--accent); font-weight:bold; font-size:12px;">${formatTime(p.total_time)}</span>
                </div>
            `).join('');

            // Отрисовка статусов группы
            document.getElementById('group-list').innerHTML = profiles.map(p => {
                const isOnline = onlineUsers[p.id]; // Проверка онлайна по Realtime
                const badgesArray = Array.isArray(p.badges) ? p.badges : [];
                const badges = badgesArray.map(b => ACHIEVEMENTS[b] || '').join('');
                const statusText = isOnline ? (p.status || '🟢 В сети') : '⚪ Офлайн';
                
                return `
                <div class="list-item" style="opacity: ${isOnline ? '1' : '0.5'}">
                    <div class="info">
                        <div class="dot ${isOnline ? 'online' : ''}"></div>
                        <div>
                            <div style="font-size:14px; font-weight:bold;">${p.username || 'Без имени'} <span style="margin-left:5px;">${badges}</span></div>
                            <div style="font-size:11px; color:#aaa;">${statusText}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // Загрузка Чата
        const { data: msgs } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(15);
        if (msgs) {
            document.getElementById('chat-box').innerHTML = msgs.reverse().map(m => `
                <div style="margin-bottom:8px; line-height:1.3;">
                    <b style="color:var(--accent);">${m.user_name}:</b> ${m.content}
                </div>
            `).join('');
        }
    }

    // Вспомогательная функция времени
    function formatTime(s) {
        if (!s) return '0с';
        const h = Math.floor(s/3600);
        const m = Math.floor((s%3600)/60);
        return h > 0 ? `${h}ч ${m}м` : `${m}м ${s%60}с`;
    }

    // --- ОТПРАВКА СООБЩЕНИЙ ---
    document.getElementById('chat-form').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (!input.value) return;
        
        // Отправка в базу (без перезагрузки)
        await supabase.from('messages').insert({ user_name: me.user_metadata.full_name, content: input.value });
        input.value = '';

        // Проверка достижения "Активист" (10 сообщений)
        const { count } = await supabase.from('messages').select('*', { count: 'exact', head: true }).eq('user_name', me.user_metadata.full_name);
        let currentBadges = Array.isArray(myProfile.badges) ? myProfile.badges : [];
        if (count >= 10 && !currentBadges.includes('activist')) {
            let newB = [...currentBadges, 'activist'];
            await supabase.from('Profile').update({ badges: newB }).eq('id', me.id);
            alert("🎉 Достижение: Активист!");
            loadMyProfile();
        }
        
        syncData(); // Обновляем экран
    };

    // --- ИНИЦИАЛИЗАЦИЯ И REALTIME ---
    async function start() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            me = session.user;
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('my-name').innerText = me.user_metadata.full_name;
            
            await loadMyProfile();
            
            // Подключение к Realtime каналу (чтобы видеть изменения от других)
            const channel = supabase.channel('main_room');
            channel.on('presence', { event: 'sync' }, () => { 
                onlineUsers = channel.presenceState(); 
                syncData(); // Обновление без перезагрузки, если кто-то зашел/вышел
            }).subscribe(async (s) => { 
                if (s === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() }); 
            });
            
            // Принудительное фоновое обновление каждые 3 секунды (для надежности)
            setInterval(syncData, 3000);
            
            // Таймер
            setInterval(() => { sessionSeconds++; document.getElementById('timer-sec').innerText = sessionSeconds; }, 1000);
        }
        syncData();
    }

    start();
</script>
</body>
</html>
