<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa400; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
  // Импортируем модули Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  // ТВОИ КЛЮЧИ
  const firebaseConfig = {
    apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
    authDomain: "database-375f4.firebaseapp.com",
    projectId: "database-375f4",
    storageBucket: "database-375f4.firebasestorage.app",
    messagingSenderId: "155181454067",
    appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
    measurementId: "G-TB3G4KSQ8S"
  };

  // Инициализация
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Логика кнопки
  const form = document.getElementById("feedbackForm");
  
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nameInput = document.getElementById("userName").value;
    const emailInput = document.getElementById("userEmail").value;

    try {
      // Запись в коллекцию "requests"
      await addDoc(collection(db, "requests"), {
        name: nameInput,
        email: emailInput,
        date: new Date().toISOString()
      });
      
      alert("Заявка успешно отправлена!");
      form.reset(); // Очищаем поля формы после успеха

    } catch (error) {
      console.error("Ошибка при добавлении документа: ", error);
      alert("Ошибка отправки! Проверь настройки доступа (Rules) в Firebase.");
    }
  });
</script>

</body>
</html>
