<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Messenger with Search Button</title>
    <style>
        :root { --google-blue: #4285F4; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Экран входа */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #google-btn { padding: 12px 24px; cursor: pointer; background: white; border: 1px solid #dadce0; border-radius: 4px; display: flex; align-items: center; gap: 10px; }

        /* Сайдбар */
        #sidebar { width: 350px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-container { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        #searchBtn { background: var(--google-blue); color: white; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-size: 18px; }

        #user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f9f9f9; }
        .user-item:hover { background: #f8f9fa; }
        .user-item.active { background: #e8f0fe; border-left: 4px solid var(--google-blue); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; }

        /* Чат */
        #chat-window { flex: 1; display: flex; flex-direction: column; background: #fff; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px 14px; border-radius: 8px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: #fff; }

        .input-area { padding: 15px; display: flex; gap: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 24px; outline: none; }
        #sendBtn { background: var(--google-blue); color: white; border: none; padding: 0 25px; border-radius: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Messenger</h2>
    <button id="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Войти через Google
    </button>
</div>

<div id="sidebar">
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Введите email полностью...">
        <button id="searchBtn">🔍</button>
    </div>
    <div id="user-list">
        <div style="padding: 20px; text-align: center; color: #999; font-size: 13px;">Найдите собеседника по почте</div>
    </div>
</div>

<div id="chat-window">
    <div id="chat-header" style="padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd;">Выберите контакт</div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Введите сообщение..." disabled>
        <button id="sendBtn" disabled>Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs, orderBy, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let activeChatId = null;
    let unsubMessages = null;

    // --- Логин ---
    document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            await setDoc(doc(db, "users", user.uid), {
                name: user.displayName,
                email: user.email.toLowerCase(),
                photo: user.photoURL,
                uid: user.uid
            }, { merge: true });
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    // --- ФУНКЦИЯ ПОИСКА ---
    async function performSearch() {
        const email = document.getElementById('searchInput').value.trim().toLowerCase();
        const userList = document.getElementById('user-list');
        
        if (!email) return;
        
        userList.innerHTML = '<div style="padding:20px; text-align:center;">Поиск...</div>';

        const q = query(collection(db, "users"), where("email", "==", email));
        const querySnapshot = await getDocs(q);
        
        userList.innerHTML = "";
        
        if (querySnapshot.empty) {
            userList.innerHTML = '<div style="padding:20px; color:red; text-align:center; font-size:12px;">Пользователь не найден</div>';
            return;
        }

        querySnapshot.forEach((uDoc) => {
            if (uDoc.id === currentUser.uid) return;
            const data = uDoc.data();
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <img class="avatar" src="${data.photo || ''}">
                <div>
                    <div style="font-weight:bold;">${data.name}</div>
                    <div style="font-size:11px; color:gray;">${data.email}</div>
                </div>
            `;
            div.onclick = () => selectChat(uDoc.id, data.name, div);
            userList.appendChild(div);
        });
    }

    // Слушатели для кнопки и Enter
    document.getElementById('searchBtn').onclick = performSearch;
    document.getElementById('searchInput').onkeypress = (e) => e.key === 'Enter' && performSearch();

    // --- Остальная логика чата ---
    function selectChat(targetUid, targetName, el) {
        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('chat-header').textContent = targetName;
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        activeChatId = [currentUser.uid, targetUid].sort().join("_");
        loadMessages(activeChatId);
    }

    function loadMessages(chatId) {
        if (unsubMessages) unsubMessages();
        const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
        unsubMessages = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            snapshot.forEach(mDoc => {
                const m = mDoc.data();
                const div = document.createElement('div');
                div.className = `msg ${m.senderId === currentUser.uid ? 'sent' : 'received'}`;
                div.textContent = m.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeChatId) return;
        await addDoc(collection(db, "chats", activeChatId, "messages"), {
            senderId: currentUser.uid,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();

</script>
</body>
</html>
