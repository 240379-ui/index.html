<!DOCTYPE html>
<html>
<head>
    <title>Firebase Table Modular SDK</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #ddd; }
    </style>
</head>
<body>

<h2>Данные из Firebase</h2>
<button onclick="loadData()">Загрузить данные</button>

<table id="dataTable">
    <thead>
        <tr id="tableHead"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script type="module">
    // 🔹 Импортируем функции из модульного SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    // 🔹 Конфигурация Firebase (твоя)
    const firebaseConfig = {
      apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
      authDomain: "database-375f4.firebaseapp.com",
      projectId: "database-375f4",
      storageBucket: "database-375f4.firebasestorage.app",
      messagingSenderId: "155181454067",
      appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
      measurementId: "G-TB3G4KSQ8S"
    };

    // 🔹 Инициализация
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // 🔹 Функция для загрузки данных и создания таблицы
    async function loadData() {
        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");

        tableHead.innerHTML = "";
        tableBody.innerHTML = "";

        try {
            // Берем все документы из коллекции "users"
            const snapshot = await getDocs(collection(db, "users"));

            if (snapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='10'>Нет данных</td></tr>";
                return;
            }

            let headersAdded = false;

            snapshot.forEach(doc => {
                const data = doc.data();

                // Создаем заголовки таблицы один раз
                if (!headersAdded) {
                    let headers = "<th>ID</th>";
                    for (let key in data) {
                        headers += `<th>${key}</th>`;
                    }
                    tableHead.innerHTML = headers;
                    headersAdded = true;
                }

                // Создаем строки таблицы
                let row = `<tr><td>${doc.id}</td>`;
                for (let key in data) {
                    row += `<td>${data[key]}</td>`;
                }
                row += "</tr>";

                tableBody.innerHTML += row;
            });

        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan='10'>Ошибка: ${error}</td></tr>`;
            console.error(error);
        }
    }
</script>

</body>
</html>
