<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase DM Messenger</title>
    <style>
        :root { --blue: #0084ff; --gray: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Авторизация */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #google-btn { padding: 15px 25px; cursor: pointer; background: white; border: 1px solid #ddd; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 16px; transition: 0.3s; }
        #google-btn:hover { background: #f9f9f9; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* Сайдбар */
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-area { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 5px; }
        .search-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .search-area button { background: var(--blue); color: white; border: none; padding: 0 12px; border-radius: 5px; cursor: pointer; }

        #user-list { flex: 1; overflow-y: auto; }
        .user-card { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f9f9f9; }
        .user-card:hover { background: #f0f7ff; }
        .user-card.active { background: #e7f3ff; border-left: 4px solid var(--blue); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; object-fit: cover; }

        /* Окно чата */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd; background: #fff; }
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f7f9fb; }
        
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my-msg { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
        .their-msg { align-self: flex-start; background: white; color: black; border-bottom-left-radius: 2px; }

        .input-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; background: white; }
        .input-bar input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        #sendBtn { background: var(--blue); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="margin-bottom: 20px;">Вход в мессенджер</h2>
    <button id="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Войти через Google
    </button>
</div>

<div id="sidebar">
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Email (точно как в базе)...">
        <button id="searchBtn">🔍</button>
    </div>
    <div id="user-list">
        <div style="padding: 20px; color: #888; text-align: center; font-size: 13px;">Введите email для начала чата</div>
    </div>
</div>

<div id="main-chat">
    <div id="chat-header">Выберите собеседника</div>
    <div id="messages-container"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Напишите сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs, orderBy, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let activeChatId = null;
    let unsubMessages = null;

    // --- ЛОГИН ---
    document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            
            // Сохраняем тебя в Firestore, чтобы ДРУГИЕ могли найти тебя
            await setDoc(doc(db, "users", user.uid), {
                name: user.displayName,
                email: user.email.toLowerCase(),
                photo: user.photoURL,
                uid: user.uid
            }, { merge: true });
            console.log("Профиль синхронизирован!");
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    // --- ПОИСК ---
    async function findUser() {
        const email = document.getElementById('searchInput').value.trim().toLowerCase();
        const listContainer = document.getElementById('user-list');
        
        if (!email) return;
        listContainer.innerHTML = '<div style="padding:15px;">Поиск...</div>';

        const q = query(collection(db, "users"), where("email", "==", email));
        const snap = await getDocs(q);
        
        listContainer.innerHTML = "";
        
        if (snap.empty) {
            listContainer.innerHTML = '<div style="padding:15px; color:red;">Пользователь не найден. Убедитесь, что он хотя бы раз входил в это приложение.</div>';
            return;
        }

        snap.forEach(uDoc => {
            if (uDoc.id === currentUser.uid) return;
            const data = uDoc.data();
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
                <img class="avatar" src="${data.photo || ''}">
                <div>
                    <div style="font-weight:bold; font-size:14px;">${data.name}</div>
                    <div style="font-size:11px; color:gray;">${data.email}</div>
                </div>
            `;
            div.onclick = () => startChat(uDoc.id, data.name, div);
            listContainer.appendChild(div);
        });
    }

    document.getElementById('searchBtn').onclick = findUser;

    // --- ЧАТ ---
    function startChat(targetUid, targetName, element) {
        document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        
        document.getElementById('chat-header').textContent = targetName;
        activeChatId = [currentUser.uid, targetUid].sort().join("_");
        
        if (unsubMessages) unsubMessages();
        
        const q = query(collection(db, "chats", activeChatId, "messages"), orderBy("timestamp", "asc"));
        unsubMessages = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('messages-container');
            container.innerHTML = "";
            snapshot.forEach(mDoc => {
                const m = mDoc.data();
                const div = document.createElement('div');
                div.className = `bubble ${m.senderId === currentUser.uid ? 'my-msg' : 'their-msg'}`;
                div.textContent = m.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    // --- ОТПРАВКА ---
    async function postMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        
        if (!text) return;
        if (!activeChatId) {
            alert("Сначала найдите пользователя по email и нажмите на него!");
            return;
        }

        await addDoc(collection(db, "chats", activeChatId, "messages"), {
            senderId: currentUser.uid,
            text: text,
            timestamp: serverTimestamp()
        });
        input.value = "";
    }

    document.getElementById('sendBtn').onclick = postMessage;
    document.getElementById('msgInput').onkeypress = (e) => e.key === 'Enter' && postMessage();

</script>
</body>
</html>
