<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Cloud Chat</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fb;
            --card-bg: #ffffff;
            --text: #333;
            --border: #edf2f7;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1px; /* Эффект тонких линий между колонками */
            background: var(--border);
            height: 100%;
        }

        /* Боковая панель */
        .sidebar {
            background: var(--card-bg);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Чат */
        .main-chat {
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Сообщения в стиле iOS/Telegram */
        .msg {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .msg.received {
            background: #f0f2f5;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg.sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Поле ввода */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 25px;
            outline: none;
            transition: 0.2s;
            background: #f9fbff;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: #fff;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Список пользователей */
        .user-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .user-item:hover {
            background: #f0f7ff;
        }

        .user-item.active {
            background: #e1efff;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">☁️ CloudChat</div>
        <div id="auth-section">
            <button id="loginBtn" style="width: 100%;">Войти через Google</button>
        </div>
        <div id="users-list" style="margin-top: 30px;">
            <p style="color: #999; font-size: 12px; text-transform: uppercase;">Контакты</p>
            </div>
    </aside>

    <main class="main-chat">
        <div class="chat-header" id="chat-title">Выберите чат</div>
        <div class="messages" id="messages">
            <div style="text-align: center; color: #999; margin-top: 50px;">Здесь будет история переписки</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Напишите сообщение...">
            <button id="sendBtn">Отправить</button>
        </div>
    </main>
</div>

<script type="module">
    // Импортируем только то, что нужно (Модульный стиль v10)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86"
    };

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    // Авторизация
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-section').innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img src="${user.photoURL}" style="width: 32px; border-radius: 50%;">
                    <span>${user.displayName}</span>
                </div>
            `;
            loadMessages();
        }
    });

    // Функция отправки
    async function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if (!text || !currentUser) return;

        try {
            await addDoc(collection(db, "public_messages"), {
                text: text,
                uid: currentUser.uid,
                userName: currentUser.displayName,
                timestamp: serverTimestamp()
            });
            document.getElementById('msgInput').value = '';
        } catch (e) {
            console.error("Ошибка при отправке: ", e);
        }
    }

    document.getElementById('sendBtn').onclick = sendMessage;

    // Загрузка сообщений в реальном времени
    function loadMessages() {
        const q = query(collection(db, "public_messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMine = data.uid === currentUser?.uid;
                
                const msgEl = document.createElement('div');
                msgEl.className = `msg ${isMine ? 'sent' : 'received'}`;
                msgEl.innerText = data.text;
                messagesDiv.appendChild(msgEl);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }
</script>

</body>
</html>
