<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус Группы</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        #myinfo { background: #e7f3ff; color: #1877f2; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        /* Цвета кнопок для наглядности (в базу они не идут) */
        .btn-1 { background-color: #42b72a; } 
        .btn-2 { background-color: #fa3e3e; }
        .btn-3 { background-color: #f7b125; }
        .btn-4 { background-color: #8a8d91; }

        .user-item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .user-item:last-child { border-bottom: none; }
        strong { font-size: 1.1em; color: #1c1e21; }
        p { margin: 4px 0 0; color: #606770; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="card">
    <div id="myinfo">Загрузка профиля...</div>

    <div class="controls">
        <button class="btn-1" onclick="changeStatus('На связи')">На связи</button>
        <button class="btn-2" onclick="changeStatus('Занят')">Занят</button>
        <button class="btn-3" onclick="changeStatus('Отойду')">Отойду</button>
        <button class="btn-4" onclick="changeStatus('Не в сети')">Оффлайн</button>
    </div>

    <h3 style="margin-bottom: 15px;">Список участников:</h3>
    <div id="grouplist">Загрузка списка...</div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Твои настройки
    const URL = 'https://yhlulkexiyalevwcuqka.supabase.co';
    const KEY = 'sb_publishable_XsWypF_waLnQZGFW6oBDcw_7vOgoLHA';
    const MY_ID = 'f455f564-7f46-4a23-b6c1-df0c5176a406';

    const supabase = createClient(URL, KEY);

    // Функция обновления (только поле status)
    window.changeStatus = async (newStatus) => {
        const { error } = await supabase
            .from('Profile')
            .update({ status: newStatus }) // Поле color удалено
            .eq('id', MY_ID);

        if (error) {
            alert("Ошибка при обновлении: " + error.message);
        } else {
            fetchGroup();
        }
    };

    // Функция получения данных
    async function fetchGroup() {
        const { data, error } = await supabase
            .from('Profile')
            .select('id, username, status')
            .order('username', { ascending: true });

        if (error) {
            document.getElementById('grouplist').innerHTML = "Ошибка: " + error.message;
            return;
        }

        const listDiv = document.getElementById('grouplist');
        listDiv.innerHTML = data.map(user => `
            <div class="user-item">
                <strong>${user.username || 'Без имени'}</strong>
                <p>${user.status || 'Нет статуса'}</p>
            </div>
        `).join('');

        const me = data.find(u => u.id === MY_ID);
        if (me) {
            document.getElementById('myinfo').innerText = `Вы вошли как: ${me.username}`;
        }
    }

    fetchGroup();
    setInterval(fetchGroup, 5000); 
</script>

</body>
</html>
