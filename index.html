<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WaveChat | Приватные сообщения + Лента</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Roboto, Arial, sans-serif;
            background: #0b141a;
            min-height: 100vh;
        }
        
        /* WhatsApp стиль */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr 1fr;
            gap: 0;
            height: 100vh;
            background: #111b21;
            overflow: hidden;
        }
        
        /* Стиль как у WhatsApp Web */
        .card {
            background: #111b21;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            border-right: 1px solid #2a3942;
        }
        
        .sidebar {
            border-right: 1px solid #2a3942;
            background: #111b21;
        }
        
        .chat-area {
            border-right: 1px solid #2a3942;
            background: #0b141a;
        }
        
        .feed-area {
            background: #0b141a;
        }
        
        /* Шапка в стиле WhatsApp */
        .whatsapp-header {
            background: #202c33;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a3942;
            flex-shrink: 0;
        }
        
        .whatsapp-header h1 {
            font-size: 1.2rem;
            font-weight: 500;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #e9edef;
            margin: 0;
        }
        
        .whatsapp-header h2 {
            font-size: 1rem;
            font-weight: 500;
            background: none;
            -webkit-background-clip: unset;
            color: #e9edef;
            margin: 0;
        }
        
        .subtitle {
            display: none;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0b141a;
        }
        
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: #2a3942;
            border-radius: 3px;
        }
        
        /* WhatsApp стиль сообщений */
        .message {
            background: #202c33;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-left: none;
            position: relative;
            max-width: 85%;
            width: fit-content;
            min-width: 200px;
        }
        
        .message-own {
            background: #005c4b;
            margin-left: auto;
            margin-right: 0;
        }
        
        .message-own .author-name {
            color: #d1d7db;
        }
        
        .message-own .message-text {
            color: #e9edef;
        }
        
        .message.deleted {
            opacity: 0.6;
            background: #1f2c33;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .author-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .author-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2a3942;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8696a0;
            font-weight: 500;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .author-name {
            font-weight: 500;
            color: #00a884;
            font-size: 0.8rem;
        }
        
        .timestamp {
            font-size: 0.65rem;
            color: #8696a0;
        }
        
        .message-text {
            margin: 4px 0;
            line-height: 1.4;
            color: #e9edef;
            font-size: 0.9rem;
            word-break: break-word;
        }
        
        .deleted-text {
            color: #8696a0;
            font-style: italic;
            font-size: 0.85rem;
        }
        
        .message-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        
        .like-btn, .delete-btn {
            width: auto;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 20px;
            background: transparent;
            margin-top: 0;
            border: none;
            color: #8696a0;
        }
        
        .like-btn {
            background: transparent;
            color: #8696a0;
        }
        
        .like-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: none;
            box-shadow: none;
        }
        
        .delete-btn {
            background: transparent;
            color: #8696a0;
        }
        
        .delete-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: none;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        
        .badge-deleted {
            background: #2a3942;
            color: #8696a0;
        }
        
        /* Стиль списка чатов */
        .users-list-container {
            flex: 1;
            overflow-y: auto;
        }
        
        .user-list-item {
            padding: 12px 16px;
            margin: 0;
            background: transparent;
            border-radius: 0;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
            border-bottom: 1px solid #2a3942;
        }
        
        .user-list-item:hover {
            background: #2a3942;
            transform: none;
        }
        
        .user-list-item.active {
            background: #2a3942;
        }
        
        .user-list-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2a3942;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8696a0;
            font-weight: 500;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .user-list-item.active .user-list-avatar {
            background: #3b4a54;
        }
        
        /* Форма ввода */
        .input-area {
            background: #202c33;
            padding: 12px 16px;
            flex-shrink: 0;
        }
        
        textarea, input {
            width: 100%;
            padding: 10px 14px;
            margin: 0;
            background: #2a3942;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            color: #e9edef;
            resize: none;
        }
        
        textarea:focus, input:focus {
            outline: none;
            background: #2a3942;
            box-shadow: none;
        }
        
        textarea {
            min-height: 40px;
            max-height: 100px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.1s;
            margin-top: 8px;
        }
        
        button:hover:not(:disabled) {
            background: #008f6b;
            transform: none;
            box-shadow: none;
        }
        
        button:disabled {
            background: #2a3942;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* Аватар в шапке */
        .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a3942;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8696a0;
            font-weight: 500;
            font-size: 16px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        
        .user-info-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-info-buttons {
            display: flex;
            gap: 8px;
        }
        
        .google-btn, .logout-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.1s;
            font-size: 0.8rem;
        }
        
        .google-btn {
            background: #00a884;
            color: white;
        }
        
        .google-btn:hover {
            background: #008f6b;
            transform: none;
        }
        
        .logout-btn {
            background: #2a3942;
            color: #e9edef;
            padding: 6px 12px;
        }
        
        .logout-btn:hover {
            background: #3b4a54;
            transform: none;
        }
        
        .switch-btn {
            background: #2a3942;
        }
        
        .notification {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 1000;
            background: #202c33;
            color: #e9edef;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .notification.success {
            background: #00a884;
            color: white;
        }
        
        .notification.error {
            background: #d3392c;
            color: white;
        }
        
        .notification.warning {
            background: #f2b807;
            color: #111b21;
        }
        
        .empty-chat {
            text-align: center;
            padding: 40px 20px;
            color: #8696a0;
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #8696a0;
        }
        
        .info-text {
            background: #202c33;
            padding: 8px 12px;
            margin-top: auto;
            font-size: 0.7rem;
            color: #8696a0;
            text-align: center;
            border-top: 1px solid #2a3942;
        }
        
        h3 {
            font-size: 0.75rem;
            margin: 0;
            padding: 16px 16px 8px;
            color: #8696a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        
        .char-counter {
            text-align: right;
            font-size: 0.65rem;
            color: #8696a0;
            margin-top: 4px;
        }
        
        .image-upload-area {
            display: none;
        }
        
        .image-preview {
            display: none;
        }
        
        .upload-progress {
            display: none;
        }
        
        /* Адаптив */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .sidebar, .chat-area, .feed-area {
                display: none;
            }
            
            .sidebar.active, .chat-area.active, .feed-area.active {
                display: flex;
            }
        }
        
        .demo-login {
            margin-top: 12px;
            padding: 12px;
            background: #202c33;
            border-radius: 12px;
        }
        
        .demo-login p {
            font-size: 0.7rem;
            color: #8696a0;
            margin-bottom: 8px;
        }
        
        .demo-btn {
            background: #2a3942;
            color: #e9edef;
            font-size: 0.75rem;
            padding: 8px;
        }
        
        .demo-btn:hover {
            background: #3b4a54;
        }
        
        .auth-section {
            padding: 16px;
            border-bottom: 1px solid #2a3942;
        }
        
        .chat-header-info {
            flex: 1;
            margin-left: 12px;
        }
        
        .chat-header-info h2 {
            font-size: 1rem;
            font-weight: 500;
            margin: 0;
        }
        
        .chat-header-info p {
            font-size: 0.7rem;
            color: #8696a0;
            margin: 2px 0 0;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="container">
    <!-- Сайдбар - список чатов -->
    <div class="card sidebar">
        <div class="whatsapp-header">
            <h1>WaveChat</h1>
            <div style="width: 40px;"></div>
        </div>
        
        <div class="auth-section">
            <div id="authButtons">
                <button class="google-btn" id="googleSignInBtn">
                    🔑 Google
                </button>
                <button class="google-btn" id="guestModeBtn" style="background: #2a3942;">
                    👁️ Гость
                </button>
                <div class="demo-login">
                    <p>⚡ Демо-режим:</p>
                    <button class="demo-btn" id="demoLoginBtn">🎭 Войти как демо</button>
                </div>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <div class="user-info-left">
                    <div class="avatar-small" id="userAvatarDiv">👤</div>
                    <span id="userNameDisplay" style="font-weight:500;"></span>
                </div>
                <div class="user-info-buttons">
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                    <button class="logout-btn switch-btn" id="switchAccountBtn">Сменить</button>
                </div>
            </div>
        </div>
        
        <div class="users-list-container">
            <h3>Чаты</h3>
            <div id="usersList">
                <div class="loading">Авторизуйтесь для общения</div>
            </div>
        </div>
        
        <div class="info-text" id="infoText">
            <span id="authStatus">Ожидание входа</span>
        </div>
    </div>
    
    <!-- Личный чат -->
    <div class="card chat-area">
        <div class="whatsapp-header" id="chatHeader">
            <div style="width: 40px;"></div>
            <div class="chat-header-info">
                <h2 id="chatWithName">Выберите чат</h2>
                <p id="chatStatus">Нажмите на собеседника</p>
            </div>
            <div style="width: 40px;"></div>
        </div>
        
        <div class="messages-container" id="privateMessagesList">
            <div class="empty-chat">👈 Выберите чат из списка</div>
        </div>
        
        <div id="privateInputArea" class="input-area" style="display: none;">
            <textarea id="privateMessageText" rows="1" placeholder="Введите сообщение..." maxlength="1000"></textarea>
            <div class="char-counter">
                <span id="privateCharCount">0</span>/1000
            </div>
            <button id="privateSendBtn">Отправить</button>
        </div>
        
        <div class="notification success" id="privateSuccessMsg">✓ Отправлено</div>
        <div class="notification error" id="privateErrorMsg">✗ Ошибка</div>
        <div class="notification warning" id="privateWarningMsg">⚠️ Запрещенные слова</div>
    </div>
    
    <!-- Общая лента -->
    <div class="card feed-area">
        <div class="whatsapp-header">
            <h2>Общая лента</h2>
            <div style="width: 40px;"></div>
        </div>
        
        <div class="messages-container" id="feedMessagesList">
            <div class="loading">Загрузка...</div>
        </div>
        
        <div id="feedForm" class="input-area">
            <input type="text" id="feedAuthor" placeholder="Ваше имя" readonly style="background: #2a3942; margin-bottom: 8px;">
            <textarea id="feedText" rows="2" placeholder="Поделитесь мыслями..." maxlength="500"></textarea>
            <div class="char-counter">
                <span id="feedCharCount">0</span>/500
            </div>
            <button id="feedSendBtn">Опубликовать</button>
        </div>
        
        <div class="notification success" id="feedSuccessMsg">✅ Опубликовано</div>
        <div class="notification error" id="feedErrorMsg">❌ Ошибка</div>
        <div class="notification warning" id="feedWarningMsg">⚠️ Недопустимые слова</div>
    </div>
</div>

<script>
    // ==================== ВСЯ ТЕХНИЧЕСКАЯ ЧАСТЬ ОСТАЕТСЯ НЕТРОНУТОЙ ====================
    const firebaseConfig = {
        apiKey: "AIzaSyA1Qy46L7WwYNph62ZuYz32bMP_OeLMNPM",
        authDomain: "database-375f4.firebaseapp.com",
        projectId: "database-375f4",
        storageBucket: "database-375f4.firebasestorage.app",
        messagingSenderId: "155181454067",
        appId: "1:155181454067:web:a3b268de7a2aa8ec48dd86",
        measurementId: "G-TB3G4KSQ8S"
    };

    let app, db, auth;
    
    try {
        app = firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        console.log("✅ Firebase инициализирован");
    } catch (e) {
        console.error("Ошибка инициализации Firebase:", e);
    }
    
    const feedPostsRef = db ? db.collection('feed_posts') : null;
    
    let currentUser = null;
    let selectedUser = null;
    let unsubscribePrivateMessages = null;
    let unsubscribeFeed = null;
    
    const badWords = ['дурак', 'идиот', 'дебил', 'тупой', 'хрен', 'фигня', 'черт', 'блин', 'жопа', 'срань', 'хрень', 'дура', 'придурок', 'лох', 'fuck', 'shit', 'damn', 'редиска', 'козел', 'сволочь', 'мудак'];
    
    function containsBadWords(text) {
        const lowerText = text.toLowerCase();
        for (let word of badWords) {
            if (lowerText.includes(word)) return true;
        }
        return false;
    }
    
    function getInitials(name) {
        if (!name) return '?';
        return name.charAt(0).toUpperCase();
    }
    
    function showNotification(prefix, type, message) {
        const element = document.getElementById(`${prefix}${type.charAt(0).toUpperCase() + type.slice(1)}Msg`);
        if (element) {
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => element.style.display = 'none', 3000);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getChatId(userId1, userId2) {
        return userId1 < userId2 ? `${userId1}_${userId2}` : `${userId2}_${userId1}`;
    }
    
    async function updateUIForAuth(user) {
        const authButtons = document.getElementById('authButtons');
        const userInfo = document.getElementById('userInfo');
        const authStatusSpan = document.getElementById('authStatus');
        const feedForm = document.getElementById('feedForm');
        const feedAuthor = document.getElementById('feedAuthor');
        const userAvatarDiv = document.getElementById('userAvatarDiv');
        
        if (user) {
            authButtons.style.display = 'none';
            userInfo.style.display = 'flex';
            const displayName = user.displayName || user.email?.split('@')[0] || 'Пользователь';
            userAvatarDiv.textContent = getInitials(displayName);
            userAvatarDiv.style.background = '#2a3942';
            document.getElementById('userNameDisplay').textContent = displayName;
            authStatusSpan.innerHTML = '✨ ' + displayName;
            feedForm.classList.remove('form-disabled');
            feedAuthor.value = displayName;
            
            if (db) {
                try {
                    await db.collection('users').doc(user.uid).set({
                        uid: user.uid, displayName: displayName, email: user.email,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                } catch(e) { console.warn("Ошибка сохранения пользователя:", e); }
                loadUsersList();
                if (unsubscribeFeed) unsubscribeFeed();
                loadFeed();
            }
        } else {
            authButtons.style.display = 'flex';
            userInfo.style.display = 'none';
            authStatusSpan.innerHTML = '🌙 Гостевой режим';
            feedForm.classList.add('form-disabled');
            feedAuthor.value = '';
            document.getElementById('usersList').innerHTML = '<div class="loading">🔐 Войдите для общения</div>';
            document.getElementById('privateMessagesList').innerHTML = '<div class="empty-chat">✨ Войдите в аккаунт</div>';
            document.getElementById('privateInputArea').style.display = 'none';
            document.getElementById('chatWithName').innerHTML = 'Требуется вход';
            document.getElementById('chatStatus').innerHTML = 'Авторизуйтесь для общения';
            if (unsubscribePrivateMessages) unsubscribePrivateMessages();
            if (unsubscribeFeed) unsubscribeFeed();
            if (feedPostsRef) loadFeed();
            selectedUser = null;
        }
    }
    
    async function loadUsersList() {
        if (!currentUser || !db) return;
        try {
            const usersSnapshot = await db.collection('users').get();
            const users = [];
            usersSnapshot.forEach(doc => {
                if (doc.id !== currentUser.uid) {
                    const data = doc.data();
                    users.push({
                        uid: doc.id,
                        displayName: data.displayName || data.email
                    });
                }
            });
            const container = document.getElementById('usersList');
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-chat">🌟 Пока нет других пользователей</div>';
                return;
            }
            let html = '';
            users.forEach(user => {
                const isActive = selectedUser && selectedUser.uid === user.uid;
                const initials = getInitials(user.displayName);
                html += `
                    <div class="user-list-item ${isActive ? 'active' : ''}" onclick="selectUser('${user.uid}', '${escapeHtml(user.displayName)}')">
                        <div class="user-list-avatar">${initials}</div>
                        <div style="flex:1;">
                            <div style="font-weight:500; color:#e9edef;">${escapeHtml(user.displayName)}</div>
                            <div style="font-size:0.7rem; color:#8696a0;">Нажмите для чата</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (err) {
            console.error("Ошибка загрузки:", err);
        }
    }
    
    window.selectUser = (uid, displayName) => {
        if (!currentUser) {
            showNotification('private', 'error', 'Войдите в аккаунт');
            return;
        }
        selectedUser = { uid, displayName };
        document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('active'));
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        document.getElementById('chatWithName').innerHTML = escapeHtml(displayName);
        document.getElementById('chatStatus').innerHTML = 'онлайн';
        document.getElementById('privateInputArea').style.display = 'block';
        loadPrivateMessages();
    };
    
    function loadPrivateMessages() {
        if (unsubscribePrivateMessages) unsubscribePrivateMessages();
        if (!currentUser || !selectedUser || !db) return;
        const chatId = getChatId(currentUser.uid, selectedUser.uid);
        unsubscribePrivateMessages = db.collection('private_messages')
            .doc(chatId)
            .collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot((snapshot) => {
                const container = document.getElementById('privateMessagesList');
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty-chat">💌 Напишите первое сообщение!</div>';
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isOwn = data.senderId === currentUser.uid;
                    const timestamp = data.timestamp?.toDate();
                    const timeStr = timestamp ? timestamp.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
                    const senderInitials = getInitials(data.senderName);
                    
                    html += `
                        <div class="message ${isOwn ? 'message-own' : ''}">
                            <div class="message-header">
                                <div class="author-info">
                                    <div class="author-avatar">${senderInitials}</div>
                                    <span class="author-name">${isOwn ? 'Вы' : escapeHtml(data.senderName)}</span>
                                </div>
                                <span class="timestamp">${timeStr}</span>
                            </div>
                            <div class="message-text">${escapeHtml(data.text || '')}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            }, (error) => {
                console.error("Ошибка загрузки сообщений:", error);
            });
    }
    
    document.getElementById('privateSendBtn').onclick = async () => {
        if (!currentUser || !selectedUser) { showNotification('private', 'error', 'Ошибка авторизации'); return; }
        const text = document.getElementById('privateMessageText').value.trim();
        if (!text) { showNotification('private', 'error', 'Введите сообщение'); return; }
        if (containsBadWords(text)) {
            showNotification('private', 'warning', 'Обнаружены запрещенные слова');
            document.getElementById('privateMessageText').value = '';
            document.getElementById('privateCharCount').textContent = '0';
            return;
        }
        
        const btn = document.getElementById('privateSendBtn');
        btn.disabled = true;
        btn.textContent = 'Отправка...';
        try {
            const chatId = getChatId(currentUser.uid, selectedUser.uid);
            await db.collection('private_messages').doc(chatId).collection('messages').add({
                text: text,
                senderId: currentUser.uid,
                senderName: currentUser.displayName || currentUser.email,
                receiverId: selectedUser.uid,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('private_messages').doc(chatId).set({
                participants: [currentUser.uid, selectedUser.uid],
                lastMessage: text,
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            document.getElementById('privateMessageText').value = '';
            document.getElementById('privateCharCount').textContent = '0';
            showNotification('private', 'success', 'Сообщение отправлено');
        } catch (err) { 
            console.error(err);
            showNotification('private', 'error', err.message); 
        }
        finally { btn.disabled = false; btn.textContent = 'Отправить'; }
    };
    
    document.getElementById('privateMessageText').addEventListener('input', function() {
        document.getElementById('privateCharCount').textContent = this.value.length;
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    document.getElementById('feedText').addEventListener('input', function() {
        document.getElementById('feedCharCount').textContent = this.value.length;
    });
    
    function loadFeed() {
        if (!feedPostsRef) return;
        if (unsubscribeFeed) unsubscribeFeed();
        unsubscribeFeed = feedPostsRef.orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('feedMessagesList');
            if (snapshot.empty) { container.innerHTML = '<div class="empty-chat">🌊 Нет сообщений, будьте первым!</div>'; return; }
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const docId = doc.id;
                const isDeleted = data.deleted === true;
                const timestamp = data.timestamp?.toDate();
                const timeStr = timestamp ? timestamp.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : 'сейчас';
                const isAuthor = currentUser && currentUser.uid === data.authorId;
                const authorInitials = getInitials(data.author);
                
                html += `
                    <div class="message ${isDeleted ? 'deleted' : ''}" style="${!isDeleted && !isAuthor ? 'margin-left:0; margin-right:auto;' : ''}">
                        <div class="message-header">
                            <div class="author-info">
                                <div class="author-avatar">${authorInitials}</div>
                                <span class="author-name">${escapeHtml(data.author)}</span>
                            </div>
                            <span class="timestamp">🕒 ${timeStr}</span>
                            ${isDeleted ? '<span class="badge badge-deleted">Удалено</span>' : ''}
                        </div>
                        <div class="message-text">${isDeleted ? '<span class="deleted-text">⚠️ Сообщение удалено</span>' : escapeHtml(data.text)}</div>
                        ${!isDeleted ? `
                            <div class="message-actions">
                                <button class="like-btn" onclick="likeFeedPost('${docId}')">❤️ ${data.likes || 0}</button>
                                ${isAuthor ? `<button class="delete-btn" onclick="deleteFeedPost('${docId}', '${data.authorId}')">🗑️ Удалить</button>` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }, (error) => {
            console.error("Ошибка загрузки ленты:", error);
        });
    }
    
    window.likeFeedPost = async (id) => {
        if (!currentUser) { showNotification('feed', 'error', 'Войдите для лайков'); return; }
        try { await feedPostsRef.doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }); } catch(e) { console.warn(e); }
    };
    
    window.deleteFeedPost = async (id, authorId) => {
        if (!currentUser || currentUser.uid !== authorId) { showNotification('feed', 'error', 'Можно удалять только свои'); return; }
        if (!confirm('Удалить сообщение?')) return;
        try { await feedPostsRef.doc(id).update({ deleted: true }); showNotification('feed', 'success', 'Удалено'); } catch(e) { showNotification('feed', 'error', 'Ошибка'); }
    };
    
    document.getElementById('feedSendBtn').onclick = async () => {
        if (!currentUser) { showNotification('feed', 'error', 'Авторизуйтесь'); return; }
        const text = document.getElementById('feedText').value.trim();
        if (!text) { showNotification('feed', 'error', 'Введите текст'); return; }
        if (containsBadWords(text)) { showNotification('feed', 'warning', 'Запрещенные слова'); document.getElementById('feedText').value = ''; document.getElementById('feedCharCount').textContent = '0'; return; }
        
        const btn = document.getElementById('feedSendBtn');
        btn.disabled = true; btn.textContent = 'Публикация...';
        try {
            await feedPostsRef.add({
                author: currentUser.displayName || currentUser.email?.split('@')[0],
                authorId: currentUser.uid,
                text: text,
                likes: 0,
                deleted: false,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('feedText').value = '';
            document.getElementById('feedCharCount').textContent = '0';
            showNotification('feed', 'success', 'Опубликовано');
        } catch (err) { showNotification('feed', 'error', err.message); }
        finally { btn.disabled = false; btn.textContent = 'Опубликовать'; }
    };
    
    document.getElementById('demoLoginBtn').onclick = async () => {
        const demoUser = {
            uid: 'demo_' + Date.now(),
            displayName: 'Demo_' + Math.floor(Math.random() * 1000),
            email: 'demo@wavechat.chat',
            isDemo: true
        };
        currentUser = demoUser;
        await updateUIForAuth(currentUser);
        showNotification('feed', 'success', `Добро пожаловать, ${currentUser.displayName}!`);
    };
    
    document.getElementById('googleSignInBtn').onclick = async () => {
        if (!auth) {
            showNotification('feed', 'error', 'Firebase Auth не инициализирован. Используйте демо-вход');
            return;
        }
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        try {
            const result = await auth.signInWithPopup(provider);
            currentUser = result.user;
            await updateUIForAuth(currentUser);
            showNotification('feed', 'success', `Добро пожаловать, ${currentUser.displayName}!`);
        } catch (err) {
            console.error("Ошибка входа:", err);
            if (err.code === 'auth/unauthorized-domain' || err.code === 'auth/operation-not-allowed') {
                showNotification('feed', 'error', 'Google вход временно недоступен. Используйте демо-режим');
            } else if (err.code !== 'auth/popup-closed-by-user') {
                showNotification('feed', 'error', err.message);
            }
        }
    };
    
    document.getElementById('logoutBtn').onclick = async () => {
        if (auth && currentUser && !currentUser.isDemo) {
            try { await auth.signOut(); } catch(e) {}
        }
        currentUser = null; selectedUser = null;
        if (unsubscribePrivateMessages) unsubscribePrivateMessages();
        updateUIForAuth(null);
        document.getElementById('privateInputArea').style.display = 'none';
        document.getElementById('chatWithName').innerHTML = 'Выберите чат';
        document.getElementById('chatStatus').innerHTML = 'Нажмите на собеседника';
    };
    
    document.getElementById('switchAccountBtn').onclick = async () => {
        if (confirm('Сменить аккаунт?')) {
            if (auth && currentUser && !currentUser.isDemo) {
                try { await auth.signOut(); } catch(e) {}
            }
            currentUser = null; selectedUser = null;
            updateUIForAuth(null);
            setTimeout(() => {
                if (confirm('Использовать демо-вход?')) {
                    document.getElementById('demoLoginBtn').click();
                } else {
                    document.getElementById('googleSignInBtn').click();
                }
            }, 300);
        }
    };
    
    document.getElementById('guestModeBtn').onclick = async () => {
        if (auth && currentUser && !currentUser.isDemo) {
            try { await auth.signOut(); } catch(e) {}
        }
        currentUser = null; selectedUser = null;
        updateUIForAuth(null);
        localStorage.setItem('guestMode', 'true');
        document.getElementById('feedForm').classList.add('form-disabled');
        document.getElementById('privateInputArea').style.display = 'none';
        showNotification('feed', 'success', 'Гостевой режим: только чтение');
        if (feedPostsRef) loadFeed();
    };
    
    if (auth) {
        auth.onAuthStateChanged((user) => {
            if (user && !currentUser) {
                currentUser = user;
                updateUIForAuth(user);
            }
        });
    }
    
    if (feedPostsRef) loadFeed();
    
    console.log('🌊 WaveChat - WhatsApp стиль');
</script>
</body>
</html>
